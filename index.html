// ─── HELPERS ──────────────────────────────────────────────────────────────────
function getTh(catKey,exId){
  const cat=OG[catKey];if(!cat)return{val:10,type:"concentric"};
  const ex=cat.progressions.find(p=>p.id===exId);if(!ex)return{val:10,type:"concentric"};
  const idx=typeof ex.level==="number"?Math.min(Math.max(0,ex.level-1),cat.repTarget.length-1):2;
  return{val:cat.repTarget[idx]||8,type:ex.type};
}
function calcR(sessions,catKey,exId){
  const th=getTh(catKey,exId);
  const sets=sessions.slice(-21).flatMap(s=>s.sets.filter(b=>b.category===catKey&&b.exerciseId===exId&&b.modifier==="std"));
  if(sets.length<2)return{ready:false,pct:0,avg:0};
  const vals=sets.map(s=>th.type==="isometric"?(s.seconds||0):(s.reps||0));
  const avg=vals.reduce((a,b)=>a+b,0)/vals.length;
  const pct=Math.min(100,Math.round(avg/th.val*100));
  return{ready:avg>=th.val,pct,avg:Math.round(avg*10)/10,target:th.val,type:th.type};
}

// ─── DOM HELPERS ──────────────────────────────────────────────────────────────
function el(tag,attrs,kids){
  const e=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object")Object.assign(e.style,v);
    else if(k==="on")Object.entries(v).forEach(([ev,fn])=>e.addEventListener(ev,fn));
    else e.setAttribute(k,v);
  });
  (Array.isArray(kids)?kids:[kids]).filter(c=>c!=null).forEach(c=>e.appendChild(typeof c==="string"?document.createTextNode(c):c));
  return e;
}
function div(style,kids){return el("div",{style:typeof style==="object"?style:{}},kids||[]);}
function span(text,style){return el("span",{style:style||{}},text);}

  const sub=div({display:"flex",alignItems:"center",gap:"10px",marginTop:"4px",flexWrap:"wrap"});
  sub.appendChild(tw(new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"}),{color:J.inkLight,fontSize:"10px"}));
  sub.appendChild(stamp(SPLITS[D.settings.split||"fullbody"].name,J.blue));
  sub.appendChild(stamp(D.sessions.length+" sessions",J.inkLight));

  else if(VIEW==="settings")root.appendChild(renderSettings());

  [{id:"wod",label:"TODAY",g:"★"},{id:"log",label:"LOG",g:"+"},{id:"progress",label:"CHARTS",g:"≡"},{id:"settings",label:"SETUP",g:"⚙"}].forEach(v=>{

      style:{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:"2px",padding:"8px 0",background:"none",border:"none",cursor:"pointer",
        color:VIEW===v.id?J.ink:J.inkLight,borderTop:VIEW===v.id?`3px solid ${J.ink}`:"3px solid transparent"},
      on:{click:()=>{VIEW=v.id;render();}}
    });
    b.appendChild(span(v.g,{fontSize:"14px",fontFamily:J.fB}));
    b.appendChild(span(v.label,{fontSize:"8px",letterSpacing:"0.1em",fontFamily:J.fH}));
    nav.appendChild(b);
  });
}

// ─── WOD ──────────────────────────────────────────────────────────────────────
function renderWod(){
  const wrap=div({display:"flex",flexDirection:"column",gap:"10px"});
  const splitKey=D.settings.split||"fullbody";
  const split=SPLITS[splitKey];
  const targetSets=parseInt(D.settings.sets)||3;
  const autoDay=new Date().getDay()%split.days.length;
  const dayIdx=wodDayIdx!==null?wodDayIdx:autoDay;

  if(split.days.length>1){
    const dsel=card();
    dsel.appendChild(lbl("Select Split Day"));
    const row=div({display:"flex",gap:"6px",flexWrap:"wrap",marginTop:"4px"});
    split.days.forEach((d,i)=>{
      row.appendChild(el("button",{
        style:{fontFamily:J.fB,fontSize:"11px",color:dayIdx===i?J.surface:J.ink,background:dayIdx===i?J.ink:"transparent",border:`1px solid ${J.inkLight}`,padding:"4px 12px",borderRadius:"2px",cursor:"pointer"},
        on:{click:()=>{wodDayIdx=i;completed={};logSets=[];render();}}
      },d.label));
    });
    dsel.appendChild(row);
    wrap.appendChild(dsel);
  }

  // ── KB CIRCUIT SECTION ──────────────────────────────────────────────────────
  const activeCircuit=D._kbCircuit||null;
  const kbC=card(null,{borderLeft:`3px solid #4a4a4a`});
  kbC.appendChild(lbl("Kettlebell Circuit"));

  // Circuit selector tabs
  const kbTabs=div({display:"flex",gap:"5px",flexWrap:"wrap",marginTop:"4px",marginBottom:activeCircuit?"10px":"0"});
  KB_CIRCUITS.forEach(c=>{
    const active=activeCircuit===c.id;
    kbTabs.appendChild(el("button",{
      style:{fontFamily:J.fB,fontSize:"10px",color:active?J.surface:"#4a4a4a",background:active?"#4a4a4a":"transparent",
        border:`1px solid ${active?"#4a4a4a":"#c9bfa8"}`,padding:"4px 9px",borderRadius:"2px",cursor:"pointer"},
      on:{click:()=>{
        D._kbCircuit=active?null:c.id;
        D._kbInputs={}; // reset per-exercise inputs when switching
        render();
      }}
    },c.name+(active?" ×":" ("+(c.rounds+"×)")));
  });
  kbC.appendChild(kbTabs);

  // If a circuit is active, show per-exercise interactive cards
  if(activeCircuit){
    const circ=KB_CIRCUITS.find(c=>c.id===activeCircuit);
    if(circ){
      // Circuit info bar
      const cinfo=div({display:"flex",gap:"12px",marginBottom:"10px",padding:"6px 8px",background:"#e8e0d0",borderRadius:"2px"});
      cinfo.appendChild(tw(circ.rounds+" rounds",{fontSize:"11px",fontFamily:J.fH,color:J.ink}));
      cinfo.appendChild(tw("Rest: "+circ.rest+" between rounds",{fontSize:"11px",color:J.inkLight}));
      kbC.appendChild(cinfo);

      if(!D._kbInputs)D._kbInputs={};

      circ.moves.forEach(mid=>{
        const ex=OG.kettlebell.progressions.find(p=>p.id===mid);
        if(!ex)return;
        const th=getTh("kettlebell",mid);
        const inp=D._kbInputs[mid]||{reps:"",mod:"std",notes:""};
        const doneKey="kb_"+mid;
        const setsDone=completed[doneKey]||0;

        const exCard=div({background:"#f4f0e8",border:`1px solid #c9bfa8`,borderRadius:"2px",padding:"10px",marginBottom:"6px"});

        // Exercise header
        const exHdr=div({display:"flex",alignItems:"center",gap:"6px",marginBottom:"6px"});
        exHdr.appendChild(stamp("KB","#4a4a4a"));
        exHdr.appendChild(el("span",{style:{flex:1,fontFamily:J.fH,fontSize:"13px",color:setsDone>0?"#2a7a2a":J.ink}},ex.name));
        exHdr.appendChild(tw("×"+circ.rounds,{fontSize:"10px",color:J.inkLight,fontFamily:J.fH}));
        if(setsDone>0)exHdr.appendChild(stamp(setsDone+" logged","#2a7a2a"));
        exCard.appendChild(exHdr);

        // Suggested scheme
        exCard.appendChild(tw("Suggested: "+(ex.scheme||th.val+" reps"),{color:J.inkLight,fontSize:"10px",fontStyle:"italic",marginBottom:"8px"}));

        // Modifier row
        const modRow=div({display:"flex",gap:"4px",flexWrap:"wrap",marginBottom:"8px"});
        MODS.forEach(m=>{
          const active=inp.mod===m.id;
          modRow.appendChild(el("button",{
            style:{fontFamily:J.fB,fontSize:"9px",color:active?J.surface:J.inkLight,background:active?J.inkLight:"transparent",
              border:`1px solid #c9bfa8`,padding:"2px 6px",borderRadius:"2px",cursor:"pointer"},
            on:{click:()=>{
              if(!D._kbInputs)D._kbInputs={};
              D._kbInputs[mid]={...inp,mod:m.id};
              render();
            }}
          },m.short));
        });
        exCard.appendChild(modRow);

        // Input row
        const inpRow=div({display:"flex",gap:"8px",alignItems:"flex-end"});
        const f1=div({flex:1});
        f1.appendChild(lbl("Reps / Secs"));
        const vi=el("input",{type:"number",min:"1",placeholder:String(th.val),value:inp.reps||"",
          style:{fontSize:"15px",fontFamily:J.fH}});
        vi.addEventListener("input",e=>{
          if(!D._kbInputs)D._kbInputs={};
          D._kbInputs[mid]={...inp,reps:e.target.value};
        });
        f1.appendChild(vi);inpRow.appendChild(f1);

        const f2=div({flex:1});
        f2.appendChild(lbl("Notes"));
        const ni=el("input",{type:"text",placeholder:"weight, form...",value:inp.notes||""});
        ni.addEventListener("input",e=>{
          if(!D._kbInputs)D._kbInputs={};
          D._kbInputs[mid]={...inp,notes:e.target.value};
        });
        f2.appendChild(ni);inpRow.appendChild(f2);

        inpRow.appendChild(inkBtn("[ + ]",()=>{
          const cur=D._kbInputs?.[mid]||{reps:"",mod:"std",notes:""};
          const val=parseInt(cur.reps)||th.val;
          const isIsoMod=cur.mod==="iso";
          logSets.push({
            id:Date.now()+Math.random(),category:"kettlebell",exerciseId:mid,
            modifier:cur.mod||"std",
            reps:!isIsoMod?val:null,
            seconds:isIsoMod?val:null,
            notes:(cur.notes||"")+(cur.notes?" · ":"")+"Circuit: "+circ.name,
            ts:Date.now()
          });
          completed[doneKey]=(completed[doneKey]||0)+1;
          if(!D._kbInputs)D._kbInputs={};
          D._kbInputs[mid]={...cur,reps:""};
          render();
        },{primary:true,small:true,style:{marginBottom:"2px"}}));
        exCard.appendChild(inpRow);
        kbC.appendChild(exCard);
      });
    }
  }
  wrap.appendChild(kbC);

  const cats=split.days[dayIdx].cats;
  const anySet=cats.some(k=>D.progressions?.[k]);

  if(!anySet){
    const warn=card(null,{borderLeft:`3px solid ${J.red}`});
    warn.appendChild(hw("No progressions set.",{color:J.red,marginBottom:"6px"}));
    warn.appendChild(tw("Go to Charts tab and tap [ SET ] on your current exercise in each category.",{color:J.inkLight}));
    warn.appendChild(el("div",{style:{marginTop:"10px"}},inkBtn("→ Go to Charts",()=>{VIEW="progress";render();},{head:true})));
    wrap.appendChild(warn);
    return wrap;
  }

  cats.forEach(catKey=>{
    const cat=OG[catKey];
    const currId=D.progressions?.[catKey];
    if(!currId){
      const c=card(null,{opacity:"0.5"});
      const row=div({display:"flex",alignItems:"center",gap:"8px"});
      row.appendChild(span(cat.icon,{color:cat.color,fontSize:"13px"}));
      row.appendChild(tw(cat.label+" — not set",{color:J.inkLight,flex:1}));
      row.appendChild(el("button",{style:{fontFamily:J.fB,fontSize:"9px",color:J.blue,background:"none",border:`1px solid ${J.blue}`,padding:"2px 6px",borderRadius:"2px",cursor:"pointer"},on:{click:()=>{VIEW="progress";setsCat=catKey;render();}}},"[ SET ]"));
      c.appendChild(row);
      wrap.appendChild(c);
      return;
    }
    const ex=cat.progressions.find(p=>p.id===currId);
    if(!ex)return;
    const th=getTh(catKey,currId);
    const doneCount=completed[catKey]||0;
    const allDone=doneCount>=targetSets;
    const isIso=ex.type==="isometric";
    const r=calcR(D.sessions,catKey,currId);
    const scheme=D.settings.repScheme||"failure";

    const c=card(null,{borderLeft:`3px solid ${allDone?"#2a7a2a":cat.color}`});

    // Title
    const trow=div({display:"flex",alignItems:"flex-start",gap:"8px",marginBottom:"8px"});
    const tl=div({flex:1});
    const tnrow=div({display:"flex",alignItems:"center",gap:"6px",flexWrap:"wrap",marginBottom:"2px"});
    tnrow.appendChild(hw(ex.name,{fontSize:"13px",color:allDone?"#2a7a2a":J.ink}));
    if(ex.pinnacle)tnrow.appendChild(stamp("pinnacle",J.red));
    if(allDone)tnrow.appendChild(stamp("done","#2a7a2a"));
    tl.appendChild(tnrow);
    tl.appendChild(tw(cat.label+" · Lvl "+(ex.level||"?")+" · "+(isIso?"Hold":"Dynamic"),{color:J.inkLight,fontSize:"10px"}));
    trow.appendChild(tl);
    trow.appendChild(div({textAlign:"right",flexShrink:"0"},[
      lbl("Sets"),
      hw(doneCount+"/"+targetSets,{fontSize:"20px",color:allDone?"#2a7a2a":J.ink})
    ]));
    c.appendChild(trow);

    // Prescription
    const tDisp=isIso?th.val+"s hold":(scheme==="rpe"?"~"+th.val+" reps (RPE 8)":(th.val+" reps to failure"));
    const presc=targetSets+" × "+tDisp;
    const pbox=div({background:"#e8e0d0",padding:"8px 10px",marginBottom:"8px",borderRadius:"2px"});
    pbox.appendChild(lbl("Today's Prescription"));
    pbox.appendChild(el("div",{style:{fontFamily:J.fH,fontSize:"15px",color:J.ink,marginTop:"2px"}},presc));
    if(r.pct>0){
      pbox.appendChild(tw("Baseline: "+r.avg+(isIso?"s":" reps")+" avg ("+r.pct+"% of target)",{color:J.inkLight,fontSize:"10px",marginTop:"3px"}));
      pbox.appendChild(ibar(r.pct,r.ready?J.green:cat.color));
    }
    if(r.ready)pbox.appendChild(el("div",{style:{marginTop:"4px"}},stamp("▲ OG threshold met — consider advancing",J.green)));
    c.appendChild(pbox);

    // Dots
    const dots=div({display:"flex",gap:"4px",marginBottom:"8px"});
    for(let i=0;i<targetSets;i++)dots.appendChild(el("div",{style:{flex:1,height:"7px",borderRadius:"1px",background:i<doneCount?J.ink:"#c9bfa8",transition:"background 0.2s"}}));
    c.appendChild(dots);

    // Buttons
    const brow=div({display:"flex",gap:"8px"});
    if(allDone){
      brow.appendChild(tw("— complete —",{color:"#2a7a2a",fontStyle:"italic",padding:"8px 0",flex:1,textAlign:"center"}));
    } else {
      brow.appendChild(inkBtn("[ LOG SET +1 ]",()=>{
        completed[catKey]=(completed[catKey]||0)+1;
        logSets.push({id:Date.now()+Math.random(),category:catKey,exerciseId:currId,modifier:"std",reps:!isIso?th.val:null,seconds:isIso?th.val:null,notes:"WOD",ts:Date.now()});
        render();
      },{primary:true,style:{flex:1}}));
    }
    if(doneCount>0)brow.appendChild(inkBtn("↩",()=>{completed[catKey]=Math.max(0,(completed[catKey]||0)-1);logSets.pop();render();},{small:true}));
    c.appendChild(brow);
    wrap.appendChild(c);
  });

  const totalDone=Object.values(completed).reduce((a,b)=>a+b,0);
  const kbDone=logSets.filter(s=>s.category==="kettlebell").length;
  if(totalDone>0||kbDone>0){
    const fin=card(null,{borderLeft:`3px solid ${J.ink}`,background:"#e8e0d0"});
    const allComplete=cats.filter(k=>D.progressions?.[k]).every(k=>(completed[k]||0)>=targetSets);
    fin.appendChild(hw(allComplete?"Session Complete":"Save Progress",{marginBottom:"6px"}));
    fin.appendChild(tw((totalDone+kbDone)+" sets logged"+(kbDone?" (incl. "+kbDone+" KB)":""),{color:J.inkLight,marginBottom:"10px"}));
    fin.appendChild(inkBtn(allComplete?"[ SIGN & SAVE SESSION ]":"[ SAVE PARTIAL SESSION ]",()=>{
      if(!logSets.length)return;
      D.sessions.push({id:Date.now(),date:new Date().toISOString().split("T")[0],sets:[...logSets]});
      saveData(D);logSets=[];completed={};wodDayIdx=null;render();
    },{primary:true,full:true,head:true}));
    wrap.appendChild(fin);
  }
  return wrap;
}

// ─── LOG ──────────────────────────────────────────────────────────────────────
function renderLog(){
  const wrap=div({display:"flex",flexDirection:"column",gap:"10px"});
  const cc=card();
  cc.appendChild(lbl("Category"));
  const cr=div({display:"flex",gap:"4px",flexWrap:"wrap",marginTop:"4px"});
  Object.entries(OG).forEach(([k,c])=>{
    const active=progCat===k;
    cr.appendChild(el("button",{
      style:{fontFamily:J.fB,fontSize:"10px",color:active?J.surface:J.ink,background:active?J.ink:"transparent",border:`1px solid ${active?J.ink:J.inkLight}`,padding:"3px 7px",borderRadius:"2px",cursor:"pointer"},
      on:{click:()=>{progCat=k;render();}}
    },c.icon+" "+c.label));
  });
  cc.appendChild(cr);
  wrap.appendChild(cc);

  const catData=OG[progCat];
  const ec=card();
  ec.appendChild(lbl("Exercise — "+catData.label));
  const el2=div({display:"flex",flexDirection:"column",gap:"2px",maxHeight:"200px",overflowY:"auto",marginTop:"4px"});
  catData.progressions.forEach(ex=>{
    const sel=D._logExId===ex.id;
    const r=calcR(D.sessions,progCat,ex.id);
    const row=el("button",{
      style:{display:"flex",alignItems:"center",gap:"7px",padding:"6px 8px",background:sel?"#e8e0d0":"transparent",border:"none",borderLeft:`2px solid ${sel?J.ink:"transparent"}`,cursor:"pointer",textAlign:"left",width:"100%"},
      on:{click:()=>{D._logExId=ex.id;D._logMod="std";render();}}
    });
    row.appendChild(span("L"+(ex.level||"?"),{fontSize:"9px",color:J.inkLight,minWidth:"18px",fontFamily:J.fB}));
    row.appendChild(el("span",{style:{flex:1,fontSize:"12px",fontFamily:J.fB,color:ex.pinnacle?J.red:J.ink}},ex.name+(ex.pinnacle?" ✦":"")));
    if(ex.kb)row.appendChild(stamp("KB","#4a4a4a"));
    row.appendChild(span(ex.type==="isometric"?"ISO":"DYN",{fontSize:"8px",color:ex.type==="isometric"?J.blue:J.red,fontFamily:J.fB}));
    if(r.ready)row.appendChild(stamp("▲",J.green));
    el2.appendChild(row);
  });
  ec.appendChild(el2);
  wrap.appendChild(ec);

  if(D._logExId){
    const exObj=catData.progressions.find(p=>p.id===D._logExId);
    const isIso=exObj?.type==="isometric"||D._logMod==="iso";
    const th=getTh(progCat,D._logExId);
    const ic=card();
    ic.appendChild(lbl("Modifier"));
    const mr=div({display:"flex",gap:"4px",flexWrap:"wrap",marginBottom:"10px",marginTop:"4px"});
    MODS.forEach(m=>{
      const active=(D._logMod||"std")===m.id;
      mr.appendChild(el("button",{
        style:{fontFamily:J.fB,fontSize:"10px",color:active?J.surface:J.inkLight,background:active?J.inkLight:"transparent",border:`1px solid ${J.inkLight}`,padding:"3px 7px",borderRadius:"2px",cursor:"pointer"},
        on:{click:()=>{D._logMod=m.id;render();}}
      },m.short));
    });
    ic.appendChild(mr);
    const ir=div({display:"flex",gap:"10px",alignItems:"flex-end"});
    const f1=div({flex:1});
    f1.appendChild(lbl(isIso?"Seconds":"Reps"));
    const vi=el("input",{type:"number",min:"1",placeholder:th.val+(isIso?"s":" reps"),value:D._logVal||"",style:{fontSize:"16px",fontFamily:J.fH}});
    vi.addEventListener("input",e=>{D._logVal=e.target.value;});
    f1.appendChild(vi);ir.appendChild(f1);
    const f2=div({flex:1});
    f2.appendChild(lbl("Notes"));
    const ni=el("input",{type:"text",placeholder:"form cues...",value:D._logNotes||""});
    ni.addEventListener("input",e=>{D._logNotes=e.target.value;});
    f2.appendChild(ni);ir.appendChild(f2);
    ir.appendChild(inkBtn("[ + ]",()=>{
      const mod=D._logMod||"std";
      const isoF=exObj?.type==="isometric"||mod==="iso";
      logSets.push({id:Date.now(),category:progCat,exerciseId:D._logExId,modifier:mod,reps:!isoF?(parseInt(D._logVal)||null):null,seconds:isoF?(parseInt(D._logVal)||null):null,notes:D._logNotes||"",ts:Date.now()});
      D._logVal="";D._logNotes="";render();
    },{primary:true,small:true,style:{marginBottom:"2px"}}));
    ic.appendChild(ir);
    wrap.appendChild(ic);
  }

  if(logSets.length){
    const sc=card(null,{background:"#e8e0d0"});
    sc.appendChild(lbl("Session — "+logSets.length+" sets"));
    logSets.forEach((s,i)=>{
      const name=OG[s.category]?.progressions.find(p=>p.id===s.exerciseId)?.name||s.exerciseId;
      const m=MODS.find(x=>x.id===s.modifier);
      const row=div({display:"flex",alignItems:"center",gap:"7px",padding:"5px 0",borderBottom:`1px dashed ${J.inkLight}`});
      row.appendChild(span(String(i+1).padStart(2,"0")+".",{fontSize:"10px",color:J.inkLight,fontFamily:J.fB}));
      row.appendChild(el("span",{style:{flex:1,fontSize:"12px",fontFamily:J.fB}},name));
      row.appendChild(stamp(m?.short||"std",J.inkLight));
      row.appendChild(span(s.seconds?s.seconds+"s":s.reps?String(s.reps):"—",{fontSize:"14px",fontFamily:J.fH,color:J.ink}));
      row.appendChild(el("button",{style:{color:J.red,background:"none",border:"none",cursor:"pointer",fontSize:"14px"},on:{click:()=>{logSets.splice(i,1);render();}}},"×"));
      sc.appendChild(row);
    });
    sc.appendChild(el("div",{style:{marginTop:"10px"}},inkBtn("[ SAVE SESSION ]",()=>{
      D.sessions.push({id:Date.now(),date:new Date().toISOString().split("T")[0],sets:[...logSets]});
      saveData(D);logSets=[];render();
    },{primary:true,full:true,head:true})));
    wrap.appendChild(sc);
  }
  return wrap;
}

// ─── PROGRESS ─────────────────────────────────────────────────────────────────
function renderProgress(){
  const wrap=div({display:"flex",flexDirection:"column",gap:"8px"});
  const cr=div({display:"flex",gap:"4px",flexWrap:"wrap",marginBottom:"6px"});
  Object.entries(OG).forEach(([k,c])=>{
    const active=setsCat===k;
    cr.appendChild(el("button",{
      style:{fontFamily:J.fB,fontSize:"10px",color:active?J.surface:J.ink,background:active?J.ink:"transparent",border:`1px solid ${active?J.ink:J.inkLight}`,padding:"3px 7px",borderRadius:"2px",cursor:"pointer"},
      on:{click:()=>{setsCat=k;render();}}
    },OG[k].icon+" "+OG[k].label));
  });
  wrap.appendChild(cr);

  const catData=OG[setsCat];
  if(catData.isKettlebell){
    const ki=card(null,{borderLeft:`3px solid ${J.inkLight}`});
    ki.appendChild(lbl("Kettlebell Library"));
    ki.appendChild(tw(catData.desc,{color:J.inkLight,marginBottom:"6px"}));
    ki.appendChild(hw("Add KB circuits from the Today tab, or log individually.",{fontSize:"12px",color:J.inkLight}));
    wrap.appendChild(ki);
  }

  catData.progressions.forEach(ex=>{
    const allSets=D.sessions.flatMap(s=>s.sets.filter(b=>b.category===setsCat&&b.exerciseId===ex.id));
    const stdSets=allSets.filter(s=>s.modifier==="std");
    const best=stdSets.reduce((b,s)=>{const v=s.seconds||s.reps||0;return v>(b?.seconds||b?.reps||0)?s:b;},null);
    const r=calcR(D.sessions,setsCat,ex.id);
    const isCurr=D.progressions?.[setsCat]===ex.id;
    const th=getTh(setsCat,ex.id);

    const c=card(null,{borderLeft:`3px solid ${isCurr?catData.color:r.ready?"#2a7a2a":"#c9bfa8"}`});
    const trow=div({display:"flex",alignItems:"center",gap:"6px",marginBottom:allSets.length?"7px":"0",flexWrap:"wrap"});
    trow.appendChild(span("L"+(ex.level||"?"),{fontSize:"9px",color:J.inkLight,minWidth:"20px",fontFamily:J.fB}));
    trow.appendChild(el("span",{style:{flex:1,fontFamily:J.fH,fontSize:"13px",color:ex.pinnacle?J.red:J.ink,fontWeight:isCurr?"bold":"normal"}},ex.name+(ex.pinnacle?" ✦":"")));
    if(ex.kb)trow.appendChild(stamp("KB","#4a4a4a"));
    trow.appendChild(span(ex.type==="isometric"?"ISO":"DYN",{fontSize:"8px",color:ex.type==="isometric"?J.blue:J.red,fontFamily:J.fB}));
    if(isCurr)trow.appendChild(stamp("current",catData.color));
    if(r.ready)trow.appendChild(stamp("▲ advance",J.green));
    trow.appendChild(el("button",{
      style:{fontFamily:J.fB,fontSize:"9px",color:J.blue,background:"none",border:`1px solid ${J.blue}`,padding:"1px 5px",borderRadius:"2px",cursor:"pointer"},
      on:{click:()=>{if(!D.progressions)D.progressions={};D.progressions[setsCat]=ex.id;saveData(D);render();}}
    },"[ SET ]"));
    c.appendChild(trow);

    if(allSets.length){
      c.appendChild(ibar(r.pct,r.ready?"#2a7a2a":catData.color));
      const stats=div({display:"flex",gap:"14px",marginTop:"6px",flexWrap:"wrap"});
      [{l:"Total",v:allSets.length},{l:"Best",v:best?(best.seconds?best.seconds+"s":String(best.reps)):"-"},{l:"Target",v:th.type==="isometric"?th.val+"s":th.val+" reps"},{l:"Recent",v:stdSets.slice(-3).map(s=>s.seconds?s.seconds+"s":String(s.reps)).join("→")||"—"}]
      .forEach(({l,v})=>{const d=div({});d.appendChild(lbl(l));d.appendChild(tw(String(v),{fontSize:"12px",fontFamily:J.fH}));stats.appendChild(d);});
      c.appendChild(stats);
    } else {
      c.appendChild(tw("No sets — target: "+(th.type==="isometric"?th.val+"s":th.val+" reps"),{color:J.inkLight,fontSize:"10px",fontStyle:"italic",marginTop:"3px"}));
    }
    wrap.appendChild(c);
  });
  return wrap;
}

// ─── SETTINGS ─────────────────────────────────────────────────────────────────
function renderSettings(){
  const wrap=div({display:"flex",flexDirection:"column",gap:"10px"});
  const s=D.settings||DS;

  const sc=card();
  sc.appendChild(lbl("Workout Split"));
  sc.appendChild(tw("OG recommends full-body for beginners. Splits work when per-session volume stays moderate.",{color:J.inkLight,marginBottom:"8px",fontSize:"11px",fontStyle:"italic"}));
  Object.entries(SPLITS).forEach(([key,sp])=>{
    const active=(s.split||"fullbody")===key;
    const row=el("div",{
      style:{display:"flex",alignItems:"flex-start",gap:"8px",padding:"8px",marginBottom:"4px",background:active?"#e8e0d0":"transparent",border:`1px solid ${active?J.ink:"#c9bfa8"}`,borderRadius:"2px",cursor:"pointer"},
      on:{click:()=>{D.settings.split=key;saveData(D);render();}}
    });
    row.appendChild(el("div",{style:{width:"12px",height:"12px",borderRadius:"50%",border:`2px solid ${active?J.ink:J.inkLight}`,background:active?J.ink:"transparent",marginTop:"2px",flexShrink:"0"}}));
    const info=div({});
    info.appendChild(el("div",{style:{fontFamily:J.fH,fontSize:"13px",color:active?J.ink:J.inkLight}},sp.name));
    info.appendChild(tw(sp.desc,{color:J.inkLight,fontSize:"10px"}));
    if(sp.days.length>1)info.appendChild(tw(sp.days.map(d=>d.label).join(" | "),{color:J.inkLight,fontSize:"9px",fontStyle:"italic"}));
    row.appendChild(info);
    sc.appendChild(row);
  });
  wrap.appendChild(sc);

  const setC=card();
  setC.appendChild(lbl("Sets Per Exercise"));
  setC.appendChild(tw("Research: 2-3 sets per muscle group optimal for high-frequency training. 1 set valid but sub-maximal.",{color:J.inkLight,marginBottom:"8px",fontSize:"11px",fontStyle:"italic"}));
  const sr=div({display:"flex",gap:"6px"});
  [1,2,3,4,5].forEach(n=>{
    const active=parseInt(s.sets||3)===n;
    sr.appendChild(el("button",{
      style:{flex:1,padding:"8px 0",textAlign:"center",fontFamily:J.fH,fontSize:"16px",color:active?J.surface:J.ink,background:active?J.ink:"transparent",border:`1px solid ${active?J.ink:J.inkLight}`,borderRadius:"2px",cursor:"pointer"},
      on:{click:()=>{D.settings.sets=n;saveData(D);render();}}
    },String(n)));
  });
  setC.appendChild(sr);
  wrap.appendChild(setC);

  const repC=card();
  repC.appendChild(lbl("Rep Scheme"));
  [{id:"failure",name:"To Failure",note:"OG standard. Maximum reps each set."},{id:"rpe",name:"RPE 8-9 (RIR 1-2)",note:"Leave 1-2 reps in reserve. Best for high-frequency — preserves CNS quality across sessions."},{id:"fixed",name:"Fixed Target",note:"Exact OG level target reps. Good for precise progression tracking."}].forEach(rs=>{
    const active=(s.repScheme||"failure")===rs.id;
    const row=el("div",{
      style:{display:"flex",gap:"8px",alignItems:"flex-start",padding:"8px",marginBottom:"4px",background:active?"#e8e0d0":"transparent",border:`1px solid ${active?J.ink:"#c9bfa8"}`,borderRadius:"2px",cursor:"pointer"},
      on:{click:()=>{D.settings.repScheme=rs.id;saveData(D);render();}}
    });
    row.appendChild(el("div",{style:{width:"12px",height:"12px",borderRadius:"50%",border:`2px solid ${active?J.ink:J.inkLight}`,background:active?J.ink:"transparent",marginTop:"2px",flexShrink:"0"}}));
    const info=div({});
    info.appendChild(el("div",{style:{fontFamily:J.fH,fontSize:"12px",color:active?J.ink:J.inkLight}},rs.name));
    info.appendChild(tw(rs.note,{color:J.inkLight,fontSize:"10px",fontStyle:"italic"}));
    row.appendChild(info);
    repC.appendChild(row);
  });
  wrap.appendChild(repC);

  const pc=card();
  pc.appendChild(lbl("Current Progressions"));
  pc.appendChild(el("hr",{style:{border:"none",borderTop:`1px solid ${J.inkLight}`,margin:"6px 0"}}));
  Object.entries(OG).forEach(([k,c])=>{
    const curr=D.progressions?.[k];
    const ex=curr?c.progressions.find(p=>p.id===curr):null;
    const row=div({display:"flex",alignItems:"center",gap:"7px",padding:"4px 0",borderBottom:`1px dashed #c9bfa8`});
    row.appendChild(span(c.icon,{color:c.color,fontSize:"11px",minWidth:"14px"}));
    row.appendChild(tw(c.label,{color:J.inkLight,minWidth:"120px",fontSize:"10px"}));
    row.appendChild(el("span",{style:{flex:1,fontFamily:J.fH,fontSize:"12px",color:ex?J.ink:J.inkLight,fontStyle:ex?"normal":"italic"}},ex?ex.name:"not set"));
    if(ex)row.appendChild(stamp("L"+ex.level,J.inkLight));
    pc.appendChild(row);
  });
  wrap.appendChild(pc);
  return wrap;
}

render();
</script>
</body>
</html>
