    padding: "1px 5px",
    borderRadius: "2px",
    textDecoration: "none",
    whiteSpace: "nowrap",
    display: "inline-block",
    cursor: "pointer"
  }, "[?]");

  b.target = "_blank";
  b.rel = "noopener noreferrer";

  b.addEventListener("click", function(e) { e.stopPropagation(); });
  return b;
}

var STEPS={
 salmon_ramen:["Slice the skinless salmon into equal fillets. Season both sides with garlic powder, smoked paprika, salt, and black pepper. Rub spices in evenly.","Heat a pan over medium heat with a little olive oil. Cook salmon 4–5 minutes per side until golden brown and seared. Set aside, keep warm.","Meanwhile, cook noodles per package or boil 5 minutes until slightly underdone (they'll finish in the sauce). Drain and rinse under cold water.","In the same pan over medium-low heat, sauté chopped garlic 2 minutes. Add chili garlic paste and light coconut milk; season with salt, black pepper, paprika. Simmer 4–5 minutes until slightly thickened.","Add cooked noodles, chopped green onion, and light + dark soy sauce. Mix gently and simmer 3–4 minutes to thicken further.","Divide noodles into 4 portions, top with seared salmon. STORE SALMON AND NOODLES SEPARATELY for reheating."],
 orange_pepper_shrimp:["In a large bowl, season peeled/deveined shrimp with salt, black pepper, garlic powder. Add honey, sriracha, fresh orange juice + zest, and light soy sauce. Mix to fully coat.","Marinate ≤20 MINUTES — citrus will 'ceviche' shrimp beyond that.","Slice cucumbers, red onion, carrots, bell pepper, green onion. Add sesame seeds, drizzle honey + rice vinegar, mix. Store in separate containers, refrigerate.","Bring salted water to boil. Cook rinsed basmati rice 8–10 minutes until tender. Drain.","Line sheet pan with parchment, spread shrimp single-layer. Add extra orange juice/zest + garlic powder + pepper on top. Roast 8–10 minutes at 400°F / 200°C OR sear 2 min/side.","Melt dairy-free butter in a pan, sauté chopped garlic 4 minutes. Fold in cooked rice, parsley, salt, chili flakes.","Plate rice + shrimp; keep cucumber salad in its own container — combine at meal time for max crunch."],
 shrimp_fried_rice_hp:["Marinate shrimp with olive oil, garlic powder, onion powder, black pepper, and soy sauce. Toss to coat.","Heat pan on high, spray with oil. Cook shrimp 2 minutes per side until pink. Remove and set aside.","Same pan, medium heat. Add mixed vegetables + green onion. Cook 2–3 minutes. Push to one side. Crack in 1 whole egg + 2 whites, scramble, then mix.","Add cooked basmati rice. Return shrimp at the end so they don't overcook.","Drizzle extra soy sauce + sesame oil; final mix and serve."],
 garlic_shrimp_fried_rice:["Wash and devein shrimp. Marinate with soy sauce, black pepper, garlic powder, onion powder, chili flakes.","Make yum yum sauce: combine mayo, ketchup, sriracha, rice vinegar, ginger powder, paprika until smooth.","Heat pan medium with butter. Cook marinated shrimp 1–2 min/side until golden. Set aside.","Same pan: sauté chopped garlic + green onion 2 minutes. Add peas + carrots, cook 2 more minutes.","Push vegetables to one side, add whisked eggs, stir until scrambled. Combine.","Add day-old rice, extra soy sauces, oyster sauce, dab of butter. Toss well, then return shrimp + green onion.","Final toss, divide into 4 servings. Drizzle yum yum sauce when serving."],
 shrimp_linguine:["Marinate shrimp: mix with minced garlic, Italian herbs, chili flakes, smoked paprika, salt, lemon juice, olive oil.","Boil linguine 7–8 minutes until al dente. RESERVE PASTA WATER, then drain.","Heat pan medium with butter. Sauté shrimp 2 min/side until golden. Lower heat, add more butter + parsley + lemon. Toss, then remove shrimp.","Same pan, low heat: combine milk, cream cheese, parmesan, extra seasoning, reserved pasta water. Stir continuously until creamy.","Add cooked pasta + spinach + shrimp back + extra parsley + another squeeze of lemon. Toss. Top with parmesan."],
 crispy_salmon_fr:["Cube skinless salmon. Season with garlic powder, onion powder, paprika, pepper, soy sauce, and cornflour. Mix to coat evenly.","Heat pan medium with cooking spray. Cook salmon 2–3 minutes until golden and crispy — in batches if needed. Set aside.","Same pan: add mixed vegetables and cook a couple minutes. Push aside, crack in eggs, stir until scrambled. Mix together.","Add cooked rice with extra soy sauce and oyster sauce. Stir to combine and heat through.","Add crispy salmon back in. Top with spicy lemon mayo (mayo + sriracha + lemon)."],
 salmon_power_bowl:["Cube skinless salmon. Season with garlic, paprika/chili flakes, light + dark soy sauce, honey, lemon juice, oil.","Thinly slice red onion + carrot. Make cucumber salad: cucumber + soy sauce + garlic + chili flakes + rice vinegar. Let marinate.","Rinse and cook jasmine rice until fluffy.","Sear salmon 2–3 minutes per side until golden and slightly crisp at edges.","Slice avocado. Mix spicy lemon mayo (mayo + sriracha + lemon).","Assemble: rice + salmon + cucumber salad + onion + carrot + avocado. Drizzle mayo, top with sesame and green onion."],
 honey_salmon_rice:["Mix marinade: dijon, crushed garlic, lemon juice, paprika, dried parsley, chili flakes, salt, pepper, honey.","Preheat oven 220°C / 430°F. Line tray with parchment, place salmon, spoon marinade over each piece.","Switch to broil. Broil 6–10 minutes depending on thickness — watch closely.","Meanwhile, stir-fry or roast broccoli + asparagus seasoned with salt, pepper, garlic powder, lemon.","Plate salmon + veggies + 100–120g cooked jasmine rice per serving."],
 honey_garlic_shrimp_stir_fry:["Season shrimp with minced garlic, smoked paprika, pepper, chili flakes, honey, lemon, dark soy. Marinate briefly.","Thinly slice onion, peppers, broccoli.","Heat pan medium with oil. Cook shrimp ~2 min/side until golden. Remove.","Same pan: cook sliced veggies 3–4 minutes until softening.","Push veggies aside, add more garlic + honey + soy in the middle. Let bubble and caramelize 1 minute, then mix.","Add cooked basmati rice, return shrimp, toss, sesame seeds."],
 creamy_shrimp_pasta:["Rinse + pat shrimp dry. Marinate with garlic, Italian herbs, paprika, salt, pepper, chili flakes, lemon.","Sear shrimp 3–4 minutes (flip halfway). Remove.","Same pan low heat: milk + cream cheese + parmesan + herbs + garlic powder + pasta water. Stir until creamy.","Add spinach + cooked pasta + shrimp. Toss until spinach wilts.","Garnish with parmesan/herbs. Serve immediately."],
 orange_pepper_chicken:["Trim excess fat from chicken thighs. Season with salt, pepper, garlic powder. Add honey, sriracha, orange juice + zest, soy sauce. Mix thoroughly — color should change. Marinate at least 30 min (a few hours better).","Slice salad veggies (cucumber, red onion, carrots, bell pepper, green onion), add sesame seeds, drizzle honey + rice vinegar. Mix, refrigerate.","Boil basmati rice 8–10 minutes. Drain.","Line sheet pan, spread chicken single-layer, add extra orange juice/zest + garlic powder + pepper on top. Air fry or oven bake 25–27 minutes @ 400°F / 200°C until golden and sizzling. Broil 2–3 minutes at end for crust.","Melt butter medium-low, add chopped garlic, cook 4 minutes. Fold cooked rice in, add parsley + salt + chili flakes.","Slice chicken into cubes, mix back with sheet pan juices (this IS the pan sauce — don't skip). Plate with garlic rice + cucumber salad."]

// Macro engine: Mifflin-St Jeor → TDEE → cut → P/F/C → per-meal split
function computeMealTargets(p){
  var kg=p.weight_kg||(p.weight_lb*0.4536);
  var cm=p.height_cm||(p.height_in*2.54);
  var bmr=(p.sex==="F")?(10*kg+6.25*cm-5*p.age-161):(10*kg+6.25*cm-5*p.age+5);
  var tdee=bmr*(p.activity||1.55);
  var kcal=Math.round(tdee-(p.deficit_kcal||0));
  var protein_g=Math.round(p.weight_lb*(p.protein_g_per_lb||1.0));
  var fat_g=Math.round(p.weight_lb*(p.fat_g_per_lb||0.4));
  var carb_kcal=kcal-protein_g*4-fat_g*9;if(carb_kcal<0)carb_kcal=0;
  var carb_g=Math.round(carb_kcal/4);
  var lbm_kg=kg*(1-(p.bf_pct||0)/100);
  var target_w=lbm_kg/(1-(p.target_bf_pct||8)/100);
  return{bmr:Math.round(bmr),tdee:Math.round(tdee),kcal:kcal,p:protein_g,c:carb_g,f:fat_g,
    lbm_kg:Math.round(lbm_kg*10)/10,lbm_lb:Math.round(lbm_kg*2.2046*10)/10,
    target_weight_kg:Math.round(target_w*10)/10,target_weight_lb:Math.round(target_w*2.2046*10)/10,
    fat_to_lose_lb:Math.round((kg-target_w)*2.2046*10)/10};
}

function classifyIngredient(name){for(var i=0;i<STORE_SECTIONS.length;i++){if(STORE_SECTIONS[i][1].test(name))return STORE_SECTIONS[i][0];}return"HEB · Other";}
function aggregatePicks(picks){
  var agg={};
  for(var i=0;i<picks.length;i++){
    var rec=recById(picks[i].recipe_id);if(!rec)continue;
    var scale=picks[i].total_servings/rec.svg;
    for(var j=0;j<rec.ing.length;j++){
      var it=rec.ing[j],key=it.n;
      if(!agg[key])agg[key]={n:it.n,g:0,oz:0,ea:0,tsp:0,tbsp:0,cup:0,notes:[]};
      if(it.g)agg[key].g+=it.g*scale;
      if(it.oz&&!it.g)agg[key].oz+=it.oz*scale;
      if(it.ea)agg[key].ea+=it.ea*scale;
      if(it.tsp)agg[key].tsp+=it.tsp*scale;
      if(it.tbsp)agg[key].tbsp+=it.tbsp*scale;
      if(it.cup)agg[key].cup+=it.cup*scale;
      if(it.swap)agg[key].notes.push(it.swap);
      if(it.swap_from)agg[key].notes.push("subbed for: "+it.swap_from);
    }
  }
  return agg;
}
function groupBySection(agg){
  var groups={};
  for(var k in agg){var sec=classifyIngredient(agg[k].n);if(!groups[sec])groups[sec]=[];groups[sec].push(agg[k]);}
  return groups;
}
function buildGroceryList(picks){
  var agg=aggregatePicks(picks);
  var groups=groupBySection(agg);
  var lines=[];
  lines.push("# Grocery List — Gravity Journal");
  lines.push("");
  lines.push("**Date:** "+isoDate(new Date()));
  var totalSvg=0;for(var i=0;i<picks.length;i++)totalSvg+=picks[i].total_servings;
  lines.push("**Total meals:** "+totalSvg+" across "+picks.length+" recipes");
  lines.push("");
  lines.push("## Recipes & Scaling");
  lines.push("");
  lines.push("| Recipe | Source | Base | Target | Scale |");
  lines.push("|---|---|---|---|---|");
  for(var i=0;i<picks.length;i++){
    var r=recById(picks[i].recipe_id);
    var sc=Math.round(picks[i].total_servings/r.svg*10)/10;
    lines.push("| "+r.name+" | "+r.book+" p."+r.page+" | "+r.svg+" | "+picks[i].total_servings+" | ×"+sc+" |");
  }
  lines.push("");
  for(var s=0;s<STORE_SECTIONS.length;s++){
    var sec=STORE_SECTIONS[s][0];
    if(!groups[sec]||!groups[sec].length)continue;
    lines.push("## "+sec);
    lines.push("");
    lines.push("| Item | oz | g | Count | Notes |");
    lines.push("|---|---|---|---|---|");
    groups[sec].sort(function(a,b){return a.n.localeCompare(b.n);});
    for(var i=0;i<groups[sec].length;i++){
      var a=groups[sec][i];
      var g=a.g?Math.round(a.g):(a.oz?ozToG(a.oz):0);
      var oz=g?gToOz(g):(a.oz?Math.round(a.oz*10)/10:0);
      var ct=[];
      if(a.ea)ct.push(Math.round(a.ea*10)/10+" each");
      if(a.tsp)ct.push(Math.round(a.tsp*10)/10+" tsp");
      if(a.tbsp)ct.push(Math.round(a.tbsp*10)/10+" Tbsp");
      if(a.cup)ct.push(Math.round(a.cup*10)/10+" cup");
      lines.push("| "+a.n+" | "+(oz||"")+" | "+(g||"")+" | "+ct.join(", ")+" | "+a.notes.join("; ")+" |");
    }
    lines.push("");
  }
  return lines.join("\n");
}
function buildPlainList(picks){
  var agg=aggregatePicks(picks);
  var groups=groupBySection(agg);
  var lines=[];
  for(var s=0;s<STORE_SECTIONS.length;s++){
    var sec=STORE_SECTIONS[s][0];
    if(!groups[sec]||!groups[sec].length)continue;
    lines.push("=== "+sec.toUpperCase()+" ===");
    groups[sec].sort(function(a,b){return a.n.localeCompare(b.n);});
    for(var i=0;i<groups[sec].length;i++){
      var a=groups[sec][i];
      var g=a.g?Math.round(a.g):(a.oz?ozToG(a.oz):0);
      var oz=g?gToOz(g):0;
      var qty="";
      if(g)qty=oz+" oz / "+g+" g";
      else if(a.ea)qty=Math.round(a.ea*10)/10+" ea";
      else if(a.tsp)qty=Math.round(a.tsp*10)/10+" tsp";
      else if(a.tbsp)qty=Math.round(a.tbsp*10)/10+" Tbsp";
      else if(a.cup)qty=Math.round(a.cup*10)/10+" cup";
      lines.push("[ ] "+a.n+"  —  "+qty);
    }
    lines.push("");
  }
  return lines.join("\n");
}

function exportData(){

  a.download="gravity-journal-backup-"+new Date().toISOString().split("T")[0]+".json";
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ── IMPORT: restore from JSON backup file ────────────────────────────────────
function importData(file,callback){
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var d=JSON.parse(e.target.result);
      // Validate structure
      if(!d.sessions||!Array.isArray(d.sessions)){callback("Invalid backup file - missing sessions.");return;}
      // Merge: keep newer sessions, don't overwrite
      var existing=loadData();
      var existingIds={};
      for(var i=0;i<existing.sessions.length;i++)existingIds[existing.sessions[i].id]=true;
      var newSessions=d.sessions.filter(function(s){return!existingIds[s.id];});
      var merged={
        sessions:existing.sessions.concat(newSessions).sort(function(a,b){return a.date>b.date?1:-1;}),
        progressions:Object.assign({},d.progressions||{},existing.progressions),
        bodyComp:existing.bodyComp||d.bodyComp||[],
        settings:existing.settings||d.settings||{}
      };
      saveData(merged);
      callback(null,newSessions.length+" new sessions merged, "+existing.sessions.length+" existing kept.");
    }catch(err){callback("Could not parse backup file: "+err.message);}
  };
  reader.readAsText(file);
}

// Compute the athlete's current axis values from real data
function computeArchetypeAxes(d){
  var ax={RS:0,PO:0,MM:0,LN:0,FX:0,SK:0};

  // RS: average current OG progression level across structural categories, scaled by 12 (Lvl 12 ≈ peak)
  var coreKeys=["push","pull","backlever","handstand","lsit","dip_mu","squat"];
  var rsSum=0,rsN=0;
  for(var i=0;i<coreKeys.length;i++){
    var pId=d.progressions&&d.progressions[coreKeys[i]];
    if(!pId)continue;var ex=findEx(coreKeys[i],pId);if(ex){rsSum+=ex.level;rsN++;}
  }
  if(rsN>0)ax.RS=Math.min(100,Math.round(rsSum/rsN/12*100));

  // PO: blend sprint 40m PR (4.5s→100, 6.5s→0) + OG plyo level + foot-rehab plyo level
  var poVals=[];
  if(d.sprint&&d.sprint.prs){
    var pr=d.sprint.prs["40"];
    if(pr&&pr.time)poVals.push(Math.max(0,Math.min(100,(6.5-pr.time)/2*100)));
  }
  if(d.progressions&&d.progressions.plyo){var ex=findEx("plyo",d.progressions.plyo);if(ex)poVals.push(Math.min(100,ex.level/6*100));}
  if(d.rehab&&d.rehab.current&&d.rehab.current.af_plyo){var ex=afExerciseById("af_plyo",d.rehab.current.af_plyo);if(ex)poVals.push(Math.min(100,ex.level/7*100));}
  if(poVals.length>0){var s=0;for(var i=0;i<poVals.length;i++)s+=poVals[i];ax.PO=Math.round(s/poVals.length);}

  // Pull body stats: prefer latest Hume scan, fall back to profile
  var weightLb,bfPct,heightIn;
  if(d.bodyComp&&d.bodyComp.length>0){var bc=d.bodyComp[d.bodyComp.length-1];if(bc.weight)weightLb=bc.weight;if(bc.bf_pct)bfPct=bc.bf_pct;}
  if((!weightLb||!bfPct)&&d.meals&&d.meals.profile){var p=d.meals.profile;if(!weightLb)weightLb=p.weight_lb;if(!bfPct)bfPct=p.bf_pct;heightIn=p.height_in;}

  // MM: FFMI-based. FFMI 17→0, 22→70, 25→100 (rough natural-cap scale)
  if(weightLb&&bfPct&&heightIn){
    var lbm_kg=weightLb*(1-bfPct/100)*0.4536;
    var h_m=heightIn*0.0254;
    var ffmi=lbm_kg/(h_m*h_m);
    ax.MM=Math.max(0,Math.min(100,Math.round((ffmi-17)*100/8)));
  }
  // LN: 25% BF→0, 5% BF→100 linear
  if(bfPct)ax.LN=Math.max(0,Math.min(100,Math.round((25-bfPct)/20*100)));

  // FX: OG mobility category level (max ~8)
  if(d.progressions&&d.progressions.mobility){var ex=findEx("mobility",d.progressions.mobility);if(ex)ax.FX=Math.min(100,Math.round(ex.level/8*100));}

  // SK: count of "peak" progressions (.p:1 flag) owned across all OG categories
  var ownedPeaks=0,totalPeaks=0;
  var ogKeys=Object.keys(OG);
  for(var i=0;i<ogKeys.length;i++){
    var cat=OG[ogKeys[i]];
    for(var j=0;j<cat.progressions.length;j++){if(cat.progressions[j].p)totalPeaks++;}
    var pId=d.progressions&&d.progressions[ogKeys[i]];
    if(pId){var ex=findEx(ogKeys[i],pId);if(ex&&ex.p)ownedPeaks++;}
  }
  if(totalPeaks>0)ax.SK=Math.min(100,Math.round(ownedPeaks/totalPeaks*200));
  return ax;
}

// Match % = inverse RMS distance, 100 = identical
function computeArchetypeMatch(current,target){
  var keys=["RS","PO","MM","LN","FX","SK"];
  var sum=0;for(var i=0;i<keys.length;i++){var d=(current[keys[i]]||0)-(target[keys[i]]||0);sum+=d*d;}
  return Math.max(0,Math.round(100-Math.sqrt(sum/keys.length)));
}

// Potential Profile arithmetic (PRD Appendix C)
function computePotentialProfile(p){
  var weight_kg=p.weight_lb*0.4536, h_m=p.height_in*0.0254;
  var lbm_kg=weight_kg*(1-p.bf_pct/100);
  var target_weight_kg=lbm_kg/(1-p.target_bf_pct/100);
  var ffmi=lbm_kg/(h_m*h_m);
  // Natural-trained ceiling reference ~25 normalized FFMI
  var ceiling_lbm_kg=25*h_m*h_m;
  return {
    lbmLb:Math.round(lbm_kg*2.2046*10)/10,
    targetWeightLb:Math.round(target_weight_kg*2.2046*10)/10,
    fatToLoseLb:Math.round((weight_kg-target_weight_kg)*2.2046*10)/10,
    ffmi:Math.round(ffmi*10)/10,
    ceilingLbmLb:Math.round(ceiling_lbm_kg*2.2046*10)/10,
    headroomLb:Math.round((ceiling_lbm_kg-lbm_kg)*2.2046*10)/10
  };
}

// SVG hexagonal radar with target overlay
function buildRadarSvg(current,target){
  var size=300,cx=size/2,cy=size/2,r=100;
  var labels=["RS","PO","MM","LN","FX","SK"];
  function pt(idx,val){var a=(idx*60-90)*Math.PI/180;return{x:cx+Math.cos(a)*r*val/100,y:cy+Math.sin(a)*r*val/100};}
  var s='<svg viewBox="0 0 '+size+' '+size+'" style="width:100%;max-width:'+size+'px;display:block;margin:0 auto">';
  // grid rings 25/50/75/100
  for(var g=25;g<=100;g+=25){var pts=[];for(var i=0;i<6;i++){var p=pt(i,g);pts.push(p.x.toFixed(1)+","+p.y.toFixed(1));}s+='<polygon points="'+pts.join(" ")+'" fill="none" stroke="#c9bfa8" stroke-width="0.5"/>';}
  // axis spokes
  for(var i=0;i<6;i++){var p=pt(i,100);s+='<line x1="'+cx+'" y1="'+cy+'" x2="'+p.x.toFixed(1)+'" y2="'+p.y.toFixed(1)+'" stroke="#c9bfa8" stroke-width="0.5"/>';}
  // target polygon (archetype)
  var tPts=[];for(var i=0;i<6;i++){var p=pt(i,target[labels[i]]||0);tPts.push(p.x.toFixed(1)+","+p.y.toFixed(1));}
  s+='<polygon points="'+tPts.join(" ")+'" fill="rgba(139,58,26,0.12)" stroke="#8b3a1a" stroke-width="1.5" stroke-dasharray="4,3"/>';
  // current polygon
  var cPts=[];for(var i=0;i<6;i++){var p=pt(i,current[labels[i]]||0);cPts.push(p.x.toFixed(1)+","+p.y.toFixed(1));}
  s+='<polygon points="'+cPts.join(" ")+'" fill="rgba(26,92,58,0.3)" stroke="#1a5c3a" stroke-width="2"/>';
  // labels + current values
  for(var i=0;i<6;i++){
    var pl=pt(i,128);
    s+='<text x="'+pl.x.toFixed(1)+'" y="'+pl.y.toFixed(1)+'" text-anchor="middle" dominant-baseline="central" font-family="Special Elite" font-size="11" fill="#2a2118">'+labels[i]+'</text>';
    var pv=pt(i,114);
    s+='<text x="'+pv.x.toFixed(1)+'" y="'+pv.y.toFixed(1)+'" text-anchor="middle" dominant-baseline="central" font-family="Courier Prime" font-size="9" fill="#1a5c3a" font-weight="bold">'+Math.round(current[labels[i]]||0)+'</text>';
  }
  s+='</svg>';
  return s;
}

function getTh(catKey,exId){
  var cat=OG[catKey];if(!cat)return{val:10,type:"con"};
  var ex=null;for(var i=0;i<cat.progressions.length;i++)if(cat.progressions[i].id===exId){ex=cat.progressions[i];break;}
  if(!ex)return{val:10,type:"con"};
  var idx=typeof ex.level==="number"?Math.min(Math.max(0,ex.level-1),cat.rt.length-1):2;
  var repVal=cat.rt[idx]||8;
  // OG: 1 rep = ~2s iso hold. Working set = 60-75% of max, use 65% midpoint.
  var val=ex.type==="iso"?Math.round(repVal*2*0.65):repVal;
  return{val:val,type:ex.type};
}
function calcR(sessions,catKey,exId){
  var th=getTh(catKey,exId),sets=[],recent=sessions.slice(-21);
  for(var i=0;i<recent.length;i++)for(var j=0;j<recent[i].sets.length;j++){var b=recent[i].sets[j];if(b.category===catKey&&b.exerciseId===exId&&b.modifier==="std")sets.push(b);}
  if(sets.length<2)return{ready:false,pct:0,avg:0,target:th.val,type:th.type};
  var total=0;for(var k=0;k<sets.length;k++)total+=(th.type==="iso"?(sets[k].seconds||0):(sets[k].reps||0));
  var avg=total/sets.length,pct=Math.min(100,Math.round(avg/th.val*100));
  return{ready:avg>=th.val,pct:pct,avg:Math.round(avg*10)/10,target:th.val,type:th.type};
}
function findEx(catKey,exId){var cat=OG[catKey];if(!cat)return null;for(var i=0;i<cat.progressions.length;i++)if(cat.progressions[i].id===exId)return cat.progressions[i];return null;}

// ── TRAINING CONTEXT BUILDER ──────────────────────────────────────────────────
// Builds a rich summary of the athlete's current state for the AI
function buildTrainingContext(){
  var d = D;
  var ctx = {};

  // Recent session frequency
  var now = Date.now();
  var day7 = now - 7*86400000;
  var day14 = now - 14*86400000;
  var sessions7 = d.sessions.filter(function(s){return new Date(s.date).getTime()>=day7;});
  var sessions14 = d.sessions.filter(function(s){return new Date(s.date).getTime()>=day14&&new Date(s.date).getTime()<day7;});
  ctx.sessionsThisWeek = sessions7.length;
  ctx.sessionsLastWeek = sessions14.length;
  ctx.totalSessions = d.sessions.length;

  // Date of last session
  if(d.sessions.length>0){
    var lastSess = d.sessions[d.sessions.length-1];
    ctx.lastSessionDate = lastSess.date;
    var daysSince = Math.round((now - new Date(lastSess.date).getTime()) / 86400000);
    ctx.daysSinceLastSession = daysSince;
  } else {
    ctx.lastSessionDate = null;
    ctx.daysSinceLastSession = null;
  }

  // Current progressions + readiness
  var ogKeys = Object.keys(OG);
  ctx.progressions = [];
  ctx.readyToAdvance = [];
  ctx.recentBests = {};

  for(var i=0;i<ogKeys.length;i++){
    var catKey = ogKeys[i];
    var cat = OG[catKey];
    var currId = d.progressions[catKey];
    if(!currId) continue;
    var ex = findEx(catKey,currId);
    if(!ex) continue;
    var th = getTh(catKey,currId);
    var r = calcR(d.sessions,catKey,currId);

    // Recent performance for this exercise
    var recentSets = [];
    var recent = d.sessions.slice(-14);
    for(var j=0;j<recent.length;j++){
      for(var k=0;k<recent[j].sets.length;k++){
        var b=recent[j].sets[k];
        if(b.category===catKey&&b.exerciseId===currId&&b.modifier==="std") recentSets.push(b);
      }
    }
    var avgVal = 0;
    if(recentSets.length>0){
      var total=0;for(var j=0;j<recentSets.length;j++)total+=(ex.type==="iso"?(recentSets[j].seconds||0):(recentSets[j].reps||0));
      avgVal = Math.round((total/recentSets.length)*10)/10;
    }

    var progEntry = {
      category: cat.label,
      exercise: ex.name,
      level: ex.level,
      type: ex.type==="iso"?"isometric":"dynamic",
      target: th.val+(ex.type==="iso"?"s":" reps"),
      avgRecent: avgVal+(ex.type==="iso"?"s":" reps"),
      readinessPct: r.pct,
      readyToAdvance: r.ready,
      setCount: recentSets.length
    };
    ctx.progressions.push(progEntry);
    if(r.ready) ctx.readyToAdvance.push(cat.label+": "+ex.name);
  }

  // Body composition (latest + trends)
  if(d.bodyComp&&d.bodyComp.length>0){
    var latest = d.bodyComp[d.bodyComp.length-1];
    ctx.bodyComp = {
      date:latest.date,
      weight:latest.weight,
      bfPct:latest.bf_pct,
      muscleLbs:latest.muscle,
      visceralFat:latest.visceral,
      bodyWaterPct:latest.water,
      boneMassLbs:latest.bone,
      metabolicAge:latest.metabolicAge,
      bmi:latest.bmi,
      segmental:latest.segmental||null
    };
    // Trends over last 3 scans
    if(d.bodyComp.length>=3){
      var older = d.bodyComp[d.bodyComp.length-3];
      if(older.weight&&latest.weight) ctx.bodyComp.weightTrend = Math.round((latest.weight-older.weight)*10)/10;
      if(older.bf_pct&&latest.bf_pct) ctx.bodyComp.bfTrend = Math.round((latest.bf_pct-older.bf_pct)*10)/10;
      if(older.muscle&&latest.muscle) ctx.bodyComp.muscleTrend = Math.round((latest.muscle-older.muscle)*10)/10;
      if(older.visceral&&latest.visceral) ctx.bodyComp.visceralTrend = Math.round((latest.visceral-older.visceral)*10)/10;
    }
    // Segmental imbalance if available
    if(latest.segmental&&latest.segmental.armL_muscle&&latest.segmental.armR_muscle){
      var leftLimb=(latest.segmental.armL_muscle||0)+(latest.segmental.legL_muscle||0);
      var rightLimb=(latest.segmental.armR_muscle||0)+(latest.segmental.legR_muscle||0);
      if(leftLimb>0&&rightLimb>0){
        ctx.bodyComp.limbImbalancePct=Math.round(Math.abs(leftLimb-rightLimb)/((leftLimb+rightLimb)/2)*1000)/10;
      }
    }
  } else {
    ctx.bodyComp = null;
  }

  // Split and settings
  ctx.split = (SPLITS[d.settings.split]||SPLITS.fullbody).name;
  ctx.setsPerExercise = d.settings.sets||3;
  ctx.repScheme = d.settings.repScheme||"failure";

  // Volume balance (push vs pull sets this week)
  var pushSets=0,pullSets=0;
  for(var i=0;i<sessions7.length;i++){
    for(var j=0;j<sessions7[i].sets.length;j++){
      var b=sessions7[i].sets[j];
      if(b.category==="push"||b.category==="dip_mu"||b.category==="handstand") pushSets++;
      if(b.category==="pull"||b.category==="backlever") pullSets++;
    }
  }
  ctx.pushSets7d = pushSets;
  ctx.pullSets7d = pullSets;
  ctx.pushPullRatio = pullSets>0?Math.round((pushSets/pullSets)*10)/10:null;

  // ── Extended modules: MEALS / SUPPS / REHAB / MARTIAL / SPRINT / HYROX ───
  var todayK=todayKey();
  var weekAgoTs=now-6*86400000;

  if(d.meals){
    var tlog=d.meals.log.filter(function(L){return L.date===todayK;});
    var mSum={kcal:0,p:0,c:0,f:0};for(var i=0;i<tlog.length;i++){mSum.kcal+=tlog[i].kcal;mSum.p+=tlog[i].p;mSum.c+=tlog[i].c;mSum.f+=tlog[i].f;}
    var mT=computeMealTargets(d.meals.profile);
    var ifday=d.meals["if"][todayK]||{};
    ctx.meals={
      targets:{kcal:mT.kcal,p:mT.p,c:mT.c,f:mT.f},
      consumedToday:mSum,
      mealsLoggedToday:tlog.length,
      ifWindowOpen:!!(ifday.start_ts&&!ifday.end_ts),
      ifWindowH:d.meals.profile.if_window_h,
      mealsPerWindow:d.meals.meals_per_window,
      rotation:d.meals.rotation.map(function(rid){var r=recById(rid);return r?r.name:rid;}),
      weightLb:d.meals.profile.weight_lb,
      currentBfPct:d.meals.profile.bf_pct,
      targetBfPct:d.meals.profile.target_bf_pct,
      proteinGPerLb:d.meals.profile.protein_g_per_lb,
      cutDeficit:d.meals.profile.deficit_kcal,
      lbmLb:mT.lbm_lb,
      targetWeightLb:mT.target_weight_lb,
      fatToLoseLb:mT.fat_to_lose_lb
    };
  }

  if(d.supps){
    var sDoses={};
    for(var i=0;i<d.supps.log.length;i++){if(d.supps.log[i].date===todayK){var sid=d.supps.log[i].supp_id;sDoses[sid]=(sDoses[sid]||0)+d.supps.log[i].dose;}}
    var stack=[];
    for(var i=0;i<d.supps.active.length;i++){var s=suppById(d.supps.active[i]);if(s){var t=sDoses[s.id]||0;stack.push({name:s.name,target:s.dose+" "+s.unit,takenToday:t+" "+s.unit,hitTarget:t>=s.dose});}}
    ctx.supps={activeStack:stack};
  }

  if(d.rehab){
    var rDoneToday={};
    for(var i=0;i<d.rehab.log.length;i++){if(d.rehab.log[i].date===todayK)rDoneToday[d.rehab.log[i].cat]=true;}
    var rehabCur=[];
    for(var i=0;i<AF.length;i++){var ex=afExerciseById(AF[i].id,d.rehab.current[AF[i].id]);rehabCur.push({category:AF[i].label,working:ex?ex.name:null,level:ex?ex.level:null,touchedToday:!!rDoneToday[AF[i].id],daily:!!AF[i].daily});}
    ctx.rehab={currentExercises:rehabCur,categoriesTouchedToday:Object.keys(rDoneToday).length,totalCategories:AF.length};
  }

  if(d.martial){
    var mMin=0,mCnt=0;
    for(var i=0;i<d.martial.log.length;i++){var t=new Date(d.martial.log[i].date+"T00:00:00").getTime();if(t>=weekAgoTs){mMin+=d.martial.log[i].duration_min;mCnt++;}}
    ctx.martial={hoursThisWeek:Math.round(mMin/60*10)/10,sessionsThisWeek:mCnt,totalSessions:d.martial.log.length};
  }

  if(d.sprint){
    var sPrs=[];for(var k in d.sprint.prs)sPrs.push({distance:k+"m",time:d.sprint.prs[k].time+"s",date:d.sprint.prs[k].date});
    sPrs.sort(function(a,b){return parseInt(a.distance)-parseInt(b.distance);});
    var lastSp=null;for(var i=d.sprint.sessions.length-1;i>=0;i--){if(d.sprint.sessions[i].done){lastSp=d.sprint.sessions[i];break;}}
    ctx.sprint={prs:sPrs,lastSession:lastSp?{date:lastSp.date,type:lastSp.type,surface:lastSp.surface,reps:lastSp.reps.length}:null,totalSessions:d.sprint.sessions.filter(function(s){return s.done;}).length};
  }

  if(d.hyrox){
    var hPrs=[];for(var k in d.hyrox.prs)hPrs.push({key:k,time:fmtSec(d.hyrox.prs[k].time_s),date:d.hyrox.prs[k].date});
    var lastHy=null;for(var i=d.hyrox.sessions.length-1;i>=0;i--){if(d.hyrox.sessions[i].done){lastHy=d.hyrox.sessions[i];break;}}
    var hTotal=0;if(lastHy)for(var i=0;i<lastHy.segments.length;i++)hTotal+=lastHy.segments[i].time_s||0;
    ctx.hyrox={prs:hPrs,lastSession:lastHy?{date:lastHy.date,type:lastHy.type,segments:lastHy.segments.length,totalTime:fmtSec(hTotal)}:null,totalSessions:d.hyrox.sessions.filter(function(s){return s.done;}).length};
  }

  // Archetype: current axes, target axes, match %, lagging axis
  if(typeof computeArchetypeAxes==="function"){
    var curAx=computeArchetypeAxes(d);
    var archId=d.archetype||"striker";
    var arch=archetypeById(archId);
    var match=computeArchetypeMatch(curAx,arch.axes);
    var keys=["RS","PO","MM","LN","FX","SK"];
    var lagAxis=null,lagGap=0;
    for(var i=0;i<keys.length;i++){var g=(arch.axes[keys[i]]||0)-(curAx[keys[i]]||0);if(g>lagGap){lagGap=g;lagAxis=keys[i];}}
    ctx.archetype={
      targeting:arch.name,
      current:curAx,
      target:arch.axes,
      matchPct:match,
      laggingAxis:lagAxis?{axis:lagAxis,label:ARCH_AXIS_LABELS[lagAxis],gap:lagGap}:null
    };
  }

  return ctx;
}

var coachState = {loading:false, response:"", error:"", mode:"wod", lastCtx:null};

function callClaude(prompt, systemPrompt, callback){
  var req = new XMLHttpRequest();
  req.open("POST","https://api.anthropic.com/v1/messages",true);
  req.setRequestHeader("Content-Type","application/json");
  req.onload = function(){
    try{
      var d = JSON.parse(req.responseText);
      var text = "";
      if(d.content&&d.content.length>0){
        for(var i=0;i<d.content.length;i++) if(d.content[i].type==="text") text+=d.content[i].text;
      }
      callback(null,text||"No response received.");
    }catch(e){callback("Parse error: "+e.message,null);}
  };
  req.onerror = function(){callback("Network error — check connection.",null);};
  req.send(JSON.stringify({
    model:"claude-sonnet-4-20250514",
    max_tokens:1000,
    system:systemPrompt,
    messages:[{role:"user",content:prompt}]
  }));
}

function renderHyrox(){
  var wrap=dv({display:"flex",flexDirection:"column",gap:"10px"});
  var sex=(D.meals&&D.meals.profile&&D.meals.profile.sex)||"M";

  // current = most recent unfinished session
  var current=null;
  for(var i=D.hyrox.sessions.length-1;i>=0;i--){
    if(!D.hyrox.sessions[i].done){current=D.hyrox.sessions[i];break;}
  }

  function loadStr(st){
    if(!st.load_m)return"";
    var w=(sex==="F"&&st.load_f)?st.load_f:st.load_m;
    return w+"kg"+(st.load_each?" each":"");
  }

  // PR card
  function prCard(){
    var c=card();
    c.appendChild(lbl("Personal Records"));
    // Station PRs
    for(var i=0;i<HYROX_STATIONS.length;i++){
      var st=HYROX_STATIONS[i];
      var key="station_"+st.id;
      var pr=D.hyrox.prs[key];
      var unitLabel=st.metric==="reps"?(st.target+" reps"):(st.target+st.unit);
      var loadLabel=loadStr(st);
      var leftText=st.name+"  ("+unitLabel+(loadLabel?", "+loadLabel:"")+")";
      var row=dv({display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:"1px dotted "+Cm,fontFamily:FB,fontSize:"11px"});
      row.appendChild(mk("span",{color:Ci},leftText));
      row.appendChild(mk("span",{color:pr?Ci:Cm},pr?(fmtSec(pr.time_s)+"  ·  "+pr.date):"—"));
      c.appendChild(row);
    }
    // Run PRs (1km is the canonical Hyrox run; others nice-to-have)
    [1000,400].forEach(function(d){
      var key="run_"+d;
      var pr=D.hyrox.prs[key];
      var row=dv({display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:"1px dotted "+Cm,fontFamily:FB,fontSize:"11px"});
      row.appendChild(mk("span",{color:Ci},d+"m run"));
      row.appendChild(mk("span",{color:pr?Ci:Cm},pr?(fmtSec(pr.time_s)+"  ·  "+pr.date):"—"));
      c.appendChild(row);
    });
    return c;
  }

  // History
  function histCard(){
    var c=card();
    c.appendChild(lbl("Recent Sessions"));
    var count=0;
    for(var i=D.hyrox.sessions.length-1;i>=0 && count<8;i--){
      var s=D.hyrox.sessions[i];
      if(!s.done)continue;count++;
      var typ=hyroxTypeById(s.type);var label=typ?typ.label:s.type;
      var total=0;for(var j=0;j<s.segments.length;j++)total+=(s.segments[j].time_s||0);
      var sRow=dv({padding:"6px 0",borderBottom:"1px dotted "+Cm});
      var top=dv({display:"flex",justifyContent:"space-between",fontFamily:FB,fontSize:"11px"});
      top.appendChild(mk("span",{color:Ci},s.date+"  ·  "+label));
      top.appendChild(mk("span",{color:Cm},s.segments.length+" seg · "+fmtSec(total)));
      sRow.appendChild(top);
      if(s.notes)sRow.appendChild(mk("div",{fontFamily:FB,fontSize:"10px",color:Cm,marginTop:"2px"},"\""+s.notes+"\""));
      c.appendChild(sRow);
    }
    if(count===0)c.appendChild(mk("div",{fontFamily:FB,fontSize:"11px",color:Cm,fontStyle:"italic",padding:"6px 0"},"No completed sessions yet."));
    return c;
  }

  // ─── IN-PROGRESS SESSION ───
  if(current){
    var typ=hyroxTypeById(current.type)||{label:current.type,desc:""};
    var hdr=card();
    var hTop=dv({display:"flex",justifyContent:"space-between",alignItems:"center"});
    hTop.appendChild(mk("div",{fontFamily:FH,fontSize:"15px",color:Ci},"IN PROGRESS · "+typ.label));
    hTop.appendChild(stamp(current.segments.length+" segments",Cb));
    hdr.appendChild(hTop);
    hdr.appendChild(mk("div",{fontFamily:FB,fontSize:"10px",color:Cm,marginTop:"4px"},current.date));
    if(typ.desc)hdr.appendChild(mk("div",{fontFamily:FB,fontSize:"10px",color:Cm,fontStyle:"italic",marginTop:"3px"},typ.desc));
    if(current.notes)hdr.appendChild(mk("div",{fontFamily:FB,fontSize:"10px",color:Ci,marginTop:"3px"},"\""+current.notes+"\""));
    wrap.appendChild(hdr);

    // PR-tracking helper
    function checkPR(key,time_s,date){
      var pr=D.hyrox.prs[key];
      if(!pr||time_s<pr.time_s){
        D.hyrox.prs[key]={time_s:time_s,date:date,session_id:current.id};
        return true;
      }
      return false;
    }

    // ADD RUN action
    function addRun(){
      var distStr=prompt("Distance (m)? Hyrox 1km default.","1000");
      var dist=parseFloat(distStr);if(!dist)return;
      var tStr=prompt("Time? (mm:ss or seconds)","");
      var t=parseTimeStr(tStr);if(!t||isNaN(t))return;
      var rpe=parseFloat(prompt("RPE (1-10)?","8"));
      var note=prompt("Notes (optional):","");
      current.segments.push({kind:"run",distance:dist,time_s:t,rpe:rpe||0,notes:note||""});
      if(checkPR("run_"+dist,t,current.date))alert("NEW PR · "+dist+"m run in "+fmtSec(t));
      saveData(D);render();
    }
    // ADD STATION action — caller passes station id
    function addStation(stId){
      var st=hyroxStationById(stId);if(!st)return;
      var loadDefault=(sex==="F"&&st.load_f)?st.load_f:(st.load_m||0);
      var loadStrIn=st.load_m?prompt("Load kg? "+(st.load_each?"(per hand)":""),loadDefault):null;
      var loadOverride=loadStrIn?parseFloat(loadStrIn):loadDefault;
      var amount;
      if(st.metric==="reps"){
        var rStr=prompt("Reps? ("+st.target+" target)",st.target);
        amount=parseInt(rStr,10);if(!amount)return;
      } else {
        var dStr=prompt("Distance m? ("+st.target+" target)",st.target);
        amount=parseFloat(dStr);if(!amount)return;
      }
      var tStr=prompt("Time? (mm:ss or seconds)","");
      var t=parseTimeStr(tStr);if(!t||isNaN(t))return;
      var rpe=parseFloat(prompt("RPE (1-10)?","9"));
      var note=prompt("Notes (optional):","");
      current.segments.push({kind:"station",station_id:stId,amount:amount,unit:st.unit,load_kg:loadOverride||null,time_s:t,rpe:rpe||0,notes:note||""});
      // PR only if at standard amount (target)
      if(amount===st.target && checkPR("station_"+stId,t,current.date))alert("NEW PR · "+st.name+" in "+fmtSec(t));
      saveData(D);render();
    }

    // Action buttons
    var actRow=dv({display:"flex",gap:"6px",margin:"4px 0"});
    var runBtn=mk("button",{flex:"1",fontFamily:FB,fontSize:"11px",letterSpacing:"0.15em",padding:"10px",background:Ci,color:Cs,border:"none",borderRadius:"2px",cursor:"pointer"},"+ ADD RUN");
    runBtn.addEventListener("click",addRun);
    actRow.appendChild(runBtn);
    var endBtn=mk("button",{flex:"1",fontFamily:FB,fontSize:"11px",letterSpacing:"0.15em",padding:"10px",background:Cr,color:Cs,border:"none",borderRadius:"2px",cursor:"pointer"},"END SESSION");
    endBtn.addEventListener("click",function(){current.done=true;hyroxPickType=null;saveData(D);render();});
    actRow.appendChild(endBtn);
    var cancBtn=mk("button",{flex:"1",fontFamily:FB,fontSize:"11px",letterSpacing:"0.15em",padding:"10px",background:"transparent",color:Ci,border:"1px solid "+Ci,borderRadius:"2px",cursor:"pointer"},"CANCEL");
    cancBtn.addEventListener("click",function(){
      if(!confirm("Discard the current in-progress session?"))return;
      for(var k=D.hyrox.sessions.length-1;k>=0;k--){if(!D.hyrox.sessions[k].done){D.hyrox.sessions.splice(k,1);break;}}
      saveData(D);render();
    });
    actRow.appendChild(cancBtn);
    wrap.appendChild(actRow);

    // Station chip picker (8 chips for the 8 stations)
    var stCard=card();
    stCard.appendChild(lbl("Add Station Segment"));
    var stRow=dv({display:"flex",flexWrap:"wrap",gap:"4px"});
    for(var i=0;i<HYROX_STATIONS.length;i++){
      (function(st){
        var b=mk("button",{fontFamily:FB,fontSize:"10px",letterSpacing:"0.05em",color:Ci,background:"transparent",border:"1px solid "+Cm,padding:"6px 10px",borderRadius:"2px",cursor:"pointer"},st.name);
        b.addEventListener("click",function(){addStation(st.id);});
        stRow.appendChild(b);
      })(HYROX_STATIONS[i]);
    }
    stCard.appendChild(stRow);
    wrap.appendChild(stCard);

    // Segments list
    var segCard=card();
    segCard.appendChild(lbl("Segments · "+current.segments.length));
    if(current.segments.length===0){
      segCard.appendChild(mk("div",{fontFamily:FB,fontSize:"11px",color:Cm,fontStyle:"italic",padding:"6px 0"},"No segments yet — tap ADD RUN or a station chip."));
    }else{
      var totalSec=0;
      for(var i=0;i<current.segments.length;i++){
        var seg=current.segments[i];totalSec+=seg.time_s||0;
        var label;
        if(seg.kind==="run")label=seg.distance+"m run";
        else{var st=hyroxStationById(seg.station_id);label=(st?st.name:seg.station_id)+"  "+seg.amount+(seg.unit==="reps"?" reps":"m")+(seg.load_kg?"  @"+seg.load_kg+"kg":"");}
        var row=dv({display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:"1px dotted "+Cm,fontFamily:FB,fontSize:"11px"});
        row.appendChild(mk("span",{color:seg.kind==="run"?Cb:Ci},"#"+(i+1)+"  "+label));
        row.appendChild(mk("span",{color:Ci},fmtSec(seg.time_s)+"  ·  RPE "+seg.rpe+(seg.notes?"  ·  "+seg.notes:"")));
        segCard.appendChild(row);
      }
      var totRow=dv({display:"flex",justifyContent:"space-between",padding:"6px 0 0",fontFamily:FB,fontSize:"11px",fontWeight:"bold"});
      totRow.appendChild(mk("span",{color:Ci},"TOTAL"));
      totRow.appendChild(mk("span",{color:Ci},fmtSec(totalSec)));
      segCard.appendChild(totRow);
    }
    wrap.appendChild(segCard);

    wrap.appendChild(prCard());
    wrap.appendChild(histCard());
    return wrap;
  }

  // ─── START NEW SESSION ───
  var startCard=card();
  startCard.appendChild(lbl("Start a Session"));
  startCard.appendChild(mk("div",{fontFamily:FB,fontSize:"10px",color:Cm,marginBottom:"4px",marginTop:"4px"},"Type"));
  var typeRow=dv({display:"flex",flexWrap:"wrap",gap:"4px",marginBottom:"6px"});
  for(var i=0;i<HYROX_TYPES.length;i++){
    (function(t){
      var active=hyroxPickType===t.id;
      var b=mk("button",{fontFamily:FB,fontSize:"10px",letterSpacing:"0.1em",color:active?Cs:Ci,background:active?Ci:"transparent",border:"1px solid "+Cm,padding:"4px 10px",borderRadius:"2px",cursor:"pointer"},t.label);
      b.addEventListener("click",function(){hyroxPickType=t.id;render();});
      typeRow.appendChild(b);
    })(HYROX_TYPES[i]);
  }
  startCard.appendChild(typeRow);
  if(hyroxPickType)startCard.appendChild(mk("div",{fontFamily:FB,fontSize:"10px",color:Cm,fontStyle:"italic",marginBottom:"10px"},hyroxTypeById(hyroxPickType).desc));

  var canStart=!!hyroxPickType;
  var startBtn=mk("button",{width:"100%",fontFamily:FB,fontSize:"12px",letterSpacing:"0.2em",padding:"14px",background:canStart?Ci:Cm,color:Cs,border:"none",borderRadius:"2px",cursor:canStart?"pointer":"default",opacity:canStart?"1":"0.55"},
    canStart?("START "+hyroxTypeById(hyroxPickType).label.toUpperCase()):"PICK A TYPE FIRST");
  if(canStart){
    startBtn.addEventListener("click",function(){
      var notes=prompt("Session notes (optional):","");
      var d=new Date();
      var iso=d.getFullYear()+"-"+("0"+(d.getMonth()+1)).slice(-2)+"-"+("0"+d.getDate()).slice(-2);
      var hm=("0"+d.getHours()).slice(-2)+":"+("0"+d.getMinutes()).slice(-2);
      D.hyrox.sessions.push({id:d.getTime(),date:iso,time:hm,type:hyroxPickType,notes:notes||"",segments:[],done:false});
      saveData(D);render();
    });
  }
  startCard.appendChild(startBtn);
  wrap.appendChild(startCard);

  wrap.appendChild(prCard());
  wrap.appendChild(histCard());
  return wrap;
}

function renderMartial(){
  var wrap=dv({display:"flex",flexDirection:"column",gap:"10px"});

  // Weekly window: last 7 days inclusive of today
  var now=new Date();
  var weekAgo=new Date(now.getTime()-6*86400000);
  var weekTotalMin=0,weekCount=0;
  for(var i=0;i<D.martial.log.length;i++){
    var entryDate=new Date(D.martial.log[i].date+"T00:00:00");
    if(entryDate>=new Date(weekAgo.getFullYear()+"-"+("0"+(weekAgo.getMonth()+1)).slice(-2)+"-"+("0"+weekAgo.getDate()).slice(-2)+"T00:00:00")){
      weekTotalMin+=D.martial.log[i].duration_min;
      weekCount++;
    }
  }
  var weekHrs=Math.round(weekTotalMin/60*10)/10;

  // Summary card
  var sc=card();
  sc.appendChild(lbl("This Week"));
  var stop=dv({display:"flex",justifyContent:"space-between",alignItems:"baseline",marginTop:"4px"});
  stop.appendChild(mk("div",{fontFamily:FH,fontSize:"28px",color:Ci},weekHrs+" hr"));
  stop.appendChild(mk("div",{fontFamily:FB,fontSize:"11px",color:Cm},weekCount+" session"+(weekCount===1?"":"s")+" · "+weekTotalMin+" min"));
  sc.appendChild(stop);
  wrap.appendChild(sc);

  // Quick-log buttons
  function logSession(minutes){
    var note=prompt("Note (optional):","");
    var d=new Date();
    D.martial.log.push({date:todayKey(),time:hmTime(d.getTime()),duration_min:minutes,notes:note||""});
    saveData(D);render();
  }
  var oneBtn=mk("button",{width:"100%",fontFamily:FB,fontSize:"12px",letterSpacing:"0.2em",padding:"16px",background:Ci,color:Cs,border:"none",borderRadius:"2px",cursor:"pointer",marginBottom:"6px"},"+ LOG 1 HOUR CLASS");
  oneBtn.addEventListener("click",function(){logSession(60);});
  wrap.appendChild(oneBtn);

  var twoBtn=mk("button",{width:"100%",fontFamily:FB,fontSize:"12px",letterSpacing:"0.2em",padding:"16px",background:Cr,color:Cs,border:"none",borderRadius:"2px",cursor:"pointer",marginBottom:"6px"},"+ LOG 2 HOUR DAY (BOTH CLASSES)");
  twoBtn.addEventListener("click",function(){logSession(120);});
  wrap.appendChild(twoBtn);

  var customBtn=mk("button",{width:"100%",fontFamily:FB,fontSize:"11px",letterSpacing:"0.15em",padding:"10px",background:"transparent",color:Ci,border:"1px solid "+Ci,borderRadius:"2px",cursor:"pointer"},"+ CUSTOM DURATION");
  customBtn.addEventListener("click",function(){
    var v=parseInt(prompt("Duration in minutes?","60"),10);
    if(v&&v>0)logSession(v);
  });
  wrap.appendChild(customBtn);

  // Recent sessions list (last 14 days)
  var rc=card();
  rc.appendChild(lbl("Recent Sessions"));
  var any=false;
  var cutoff=new Date(now.getTime()-13*86400000);
  var cutoffKey=cutoff.getFullYear()+"-"+("0"+(cutoff.getMonth()+1)).slice(-2)+"-"+("0"+cutoff.getDate()).slice(-2);
  for(var i=D.martial.log.length-1;i>=0;i--){
    var L=D.martial.log[i];
    if(L.date<cutoffKey)break;
    any=true;
    var row=dv({display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px dotted "+Cm,fontFamily:FB,fontSize:"11px"});
    var ll=dv({});
    ll.appendChild(mk("span",{color:Ci},L.date+(L.time?"  "+L.time:"")));
    if(L.notes)ll.appendChild(mk("div",{fontFamily:FB,fontSize:"10px",color:Cm,fontStyle:"italic",marginTop:"2px"},"\""+L.notes+"\""));
    row.appendChild(ll);
    var rr=dv({display:"flex",gap:"8px",alignItems:"center"});
    rr.appendChild(mk("span",{color:Ci,fontWeight:"bold"},L.duration_min+" min"));
    var delBtn=mk("button",{fontFamily:FB,fontSize:"9px",color:Cm,background:"transparent",border:"1px solid "+Cm,padding:"2px 6px",borderRadius:"2px",cursor:"pointer"},"×");
    (function(idx){delBtn.addEventListener("click",function(){if(confirm("Delete this session?")){D.martial.log.splice(idx,1);saveData(D);render();}});})(i);
    rr.appendChild(delBtn);
    row.appendChild(rr);
    rc.appendChild(row);
  }
  if(!any)rc.appendChild(mk("div",{fontFamily:FB,fontSize:"11px",color:Cm,fontStyle:"italic",padding:"6px 0"},"No sessions in the last 14 days."));
  wrap.appendChild(rc);

  return wrap;
}

function renderRehab(){
  if(rehabPickerCat)return renderRehabPicker(rehabPickerCat);

  var wrap=dv({display:"flex",flexDirection:"column",gap:"10px"});
  var today=todayKey();
  var doneToday={};
  for(var i=0;i<D.rehab.log.length;i++){if(D.rehab.log[i].date===today)doneToday[D.rehab.log[i].cat]=true;}
  var doneCount=0;for(var k in doneToday)doneCount++;

  wrap.appendChild(mk("div",{fontFamily:FB,fontSize:"10px",color:Cm,marginBottom:"4px"},
    today+"  ·  "+doneCount+" / "+AF.length+" categories touched today  ·  Daily = one-tap log; Strength/Plyo = sets × reps"));

  function buildAfCard(c,isStrength){
    var cur=afExerciseById(c.id,D.rehab.current[c.id])||c.progressions[0];
    var done=!!doneToday[c.id];
    var rc=dv({padding:"10px",border:"1px solid "+(done?Cg:Cm),marginBottom:"6px",cursor:c.daily?"pointer":"default",background:done?"rgba(26,92,58,0.08)":"transparent"});
    var top=dv({display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:"8px"});
    var ll=dv({flex:"1"});
    ll.appendChild(mk("div",{fontFamily:FH,fontSize:"13px",color:Ci},c.icon+"  "+c.label+(done?"  ✓":"")));
    ll.appendChild(mk("div",{fontFamily:FB,fontSize:"10px",color:Cm,marginTop:"2px"},c.desc));
    var working=mk("div",{fontFamily:FB,fontSize:"10px",color:Cb,marginTop:"3px"},"Working: "+cur.name+"  ·  L"+cur.level+"  ·  "+cur.type);
    ll.appendChild(working);
    if(cur.proto==="alfredson")ll.appendChild(stamp("ALFREDSON 3×15 BID",Cr));
    top.appendChild(ll);

    var rr=dv({display:"flex",gap:"6px",alignItems:"center"});
    var pickBtn=mk("button",{fontFamily:FB,fontSize:"9px",letterSpacing:"0.1em",color:Ci,background:"transparent",border:"1px solid "+Cm,padding:"3px 8px",borderRadius:"2px",cursor:"pointer"},"PICK");
    pickBtn.addEventListener("click",function(ev){ev.stopPropagation();rehabPickerCat=c.id;render();window.scrollTo(0,0);});
    rr.appendChild(pickBtn);
    if(isStrength){
      var logBtn=mk("button",{fontFamily:FB,fontSize:"9px",letterSpacing:"0.1em",color:Cs,background:Ci,border:"none",padding:"5px 10px",borderRadius:"2px",cursor:"pointer"},"LOG SET");
      logBtn.addEventListener("click",function(ev){
        ev.stopPropagation();
        var sets=parseInt(prompt("Sets? (current: "+cur.name+")","3"),10);
        if(!sets)return;
        var rOrS=(cur.type==="iso")?"Seconds per set?":"Reps per set?";
        var v=parseFloat(prompt(rOrS,cur.type==="iso"?"30":"10"));
        if(!v)return;
        var load=parseFloat(prompt("Load lb? (0 for bodyweight)","0"));
        var side=prompt("Side? (L/R/BOTH)","BOTH");
        var d=new Date();
        D.rehab.log.push({date:today,time:hmTime(d.getTime()),cat:c.id,exercise_id:cur.id,sets:sets,reps:cur.type==="iso"?null:v,seconds:cur.type==="iso"?v:null,load_lb:load||0,side:side||"BOTH"});
        saveData(D);render();
      });
      rr.appendChild(logBtn);
    }
    top.appendChild(rr);
    rc.appendChild(top);

    if(c.daily){
      rc.addEventListener("click",function(){
        var d=new Date();
        D.rehab.log.push({date:today,time:hmTime(d.getTime()),cat:c.id,exercise_id:cur.id,sets:1,reps:null,seconds:null});
        saveData(D);render();
      });
    }
    return rc;
  }

  var dailyCard=card();
  dailyCard.appendChild(lbl("Daily Maintenance"));
  dailyCard.appendChild(mk("div",{fontFamily:FB,fontSize:"10px",color:Cm,marginBottom:"6px"},"Tap any card to log \"done today\". 5–10 min total target."));
  for(var i=0;i<AF.length;i++){if(AF[i].daily)dailyCard.appendChild(buildAfCard(AF[i],false));}
  wrap.appendChild(dailyCard);

  var strCard=card();
  strCard.appendChild(lbl("Strength & Power"));
  strCard.appendChild(mk("div",{fontFamily:FB,fontSize:"10px",color:Cm,marginBottom:"6px"},"Tap LOG SET to record sets × reps × load. 2–3x/wk. Plyo: long rest, not to failure."));
  for(var i=0;i<AF.length;i++){if(!AF[i].daily)strCard.appendChild(buildAfCard(AF[i],true));}
  wrap.appendChild(strCard);

  var hcard=card();
  hcard.appendChild(lbl("Today · Log"));
  var any=false;
  for(var i=D.rehab.log.length-1;i>=0;i--){
    if(D.rehab.log[i].date===today){
      any=true;
      var L=D.rehab.log[i],c=afCatById(L.cat),ex=afExerciseById(L.cat,L.exercise_id);
      var parts=[];
      if(L.sets&&(L.reps||L.seconds))parts.push(L.sets+"×"+(L.reps||L.seconds+"s"));
      if(L.load_lb)parts.push(L.load_lb+" lb");
      if(L.side&&L.side!=="BOTH")parts.push(L.side);
      var row=dv({display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:"1px dotted "+Cm,fontFamily:FB,fontSize:"11px"});
      row.appendChild(mk("span",{},L.time+"  "+(c?c.label:L.cat)+"  ·  "+(ex?ex.name:L.exercise_id)));
      row.appendChild(mk("span",{},parts.join("  ·  ")));
      hcard.appendChild(row);
    }
  }
  if(!any)hcard.appendChild(mk("div",{fontFamily:FB,fontSize:"11px",color:Cm,fontStyle:"italic",padding:"6px 0"},"Nothing logged today."));
  wrap.appendChild(hcard);

  return wrap;
}

function renderRehabPicker(catId){

  var c=afCatById(catId);
  if(!c){wrap.appendChild(mk("div",{},"Unknown category"));return wrap;}
  var back=mk("button",{fontFamily:FB,fontSize:"10px",letterSpacing:"0.15em",color:Ci,background:"transparent",border:"1px solid "+Ci,padding:"6px 12px",borderRadius:"2px",cursor:"pointer",alignSelf:"flex-start"},"← BACK");
  back.addEventListener("click",function(){rehabPickerCat=null;render();window.scrollTo(0,0);});
  wrap.appendChild(back);
  wrap.appendChild(mk("div",{fontFamily:FH,fontSize:"15px",color:Ci,marginTop:"2px"},c.label));
  wrap.appendChild(mk("div",{fontFamily:FB,fontSize:"10px",color:Cm,marginBottom:"6px"},c.desc));
  wrap.appendChild(mk("div",{fontFamily:FB,fontSize:"10px",color:Cm,marginBottom:"4px"},"Tap the level you're currently working. Becomes the \"Working\" exercise on the rehab home."));
  var lc=card();
  for(var i=0;i<c.progressions.length;i++){
    (function(ex){
      var active=D.rehab.current[catId]===ex.id;

      var ll=dv({});
      ll.appendChild(mk("span",{fontFamily:FB,fontSize:"11px",color:Ci,fontWeight:"bold"},"L"+ex.level+"  "));
      ll.appendChild(mk("span",{fontFamily:FB,fontSize:"11px",color:Ci},ex.name+"  "));
      ll.appendChild(stamp(ex.type,ex.type==="iso"?Cb:Cr));
      if(ex.proto==="alfredson"){var s=stamp("ALFREDSON",Cr);s.style.marginLeft="4px";ll.appendChild(s);}
      row.appendChild(ll);
      row.appendChild(mk("span",{fontFamily:FB,fontSize:"14px",color:active?Cg:Cm},active?"✓":"·"));

      lc.appendChild(row);
    })(c.progressions[i]);
  }
  wrap.appendChild(lc);
  return wrap;
}

function renderMeals(){
  var wrap=dv({display:"flex",flexDirection:"column",gap:"10px"});

  // Recipe detail takes over the whole view
  if(mealsRecipeId){wrap.appendChild(renderRecipeDetail(mealsRecipeId));return wrap;}

  // Sub-nav pill bar
  var subnav=dv({display:"flex",gap:"4px",marginBottom:"4px",flexWrap:"wrap"});
  var subs=[["today","TODAY"],["rotate","ROTATE"],["plan","PLAN"],["stack","STACK"]];
  for(var i=0;i<subs.length;i++){
    (function(sub){
      var active=mealsSub===sub[0];
      var b=mk("button",{fontFamily:FB,fontSize:"10px",letterSpacing:"0.1em",color:active?Cs:Ci,background:active?Ci:"transparent",border:"1px solid "+Cm,padding:"5px 14px",borderRadius:"2px",cursor:"pointer"},sub[1]);
      b.addEventListener("click",function(){mealsSub=sub[0];render();});
      subnav.appendChild(b);
    })(subs[i]);
  }
  wrap.appendChild(subnav);

  if(mealsSub==="today")wrap.appendChild(renderMealsToday());
  else if(mealsSub==="rotate")wrap.appendChild(renderMealsRotate());
  else if(mealsSub==="plan")wrap.appendChild(renderMealsPlan());
  else if(mealsSub==="stack")wrap.appendChild(renderMealsStack());
  return wrap;
}

  var wrap=dv({display:"flex",flexDirection:"column",gap:"10px"});
  wrap.appendChild(mk("div",{fontFamily:FB,fontSize:"10px",color:Cm,marginBottom:"4px"},"Tap to toggle active/inactive. Active supplements show on TODAY for tap-to-log."));
  for(var i=0;i<SUPP.length;i++){
    (function(s){
      var active=D.supps.active.indexOf(s.id)>=0;
      var rcard=dv({padding:"10px",border:"1px solid "+(active?Cg:Cm),marginBottom:"6px",cursor:"pointer",background:active?"rgba(26,92,58,0.08)":"transparent"});
      var top=dv({display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:"8px"});
      var ll=dv({flex:"1"});

function macroBar(label,cur,tgt,unit,color){
  var pct=tgt>0?Math.min(100,Math.round(cur/tgt*100)):0;
  var over=cur>tgt*1.05;
  var w=dv({margin:"4px 0"});
  var top=dv({display:"flex",justifyContent:"space-between",fontFamily:FB,fontSize:"10px"});
  top.appendChild(mk("span",{color:Ci},label));
  top.appendChild(mk("span",{color:Ci},Math.round(cur)+" / "+tgt+" "+unit));
  w.appendChild(top);
  var bar=dv({height:"6px",background:Cl,position:"relative",overflow:"hidden",marginTop:"2px"});
  bar.appendChild(dv({height:"100%",width:pct+"%",background:over?Cr:color}));
  w.appendChild(bar);
  return w;
}
function macroGrid(vals,labels){
  var g=dv({display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:"4px",textAlign:"center"});
  for(var i=0;i<4;i++){
    var box=dv({padding:"6px 2px",background:Cy,border:"1px solid "+Cm});

    g.appendChild(box);
  }
  return g;
}

    n.appendChild(mk("div",{fontFamily:FB,fontSize:"10px",color:Ci},"NOTE: "+r.note));
    wrap.appendChild(n);
  }

  // scale chips
  var planTarget=mealsPlanInput[id]||D.meals.prep_servings;
  var prepScale=Math.round(planTarget/r.svg*10)/10;
  var chipRow=dv({display:"flex",flexWrap:"wrap",gap:"4px"});
  var chipOpts=[[1,"BASE ("+r.svg+" svg)"],[2,"×2 ("+(r.svg*2)+" svg)"],[prepScale,"PREP ("+planTarget+" svg)"]];
  chipOpts.forEach(function(c){
    var sv=c[0],lab=c[1];
    var active=Math.abs(sv-scale)<0.01;
    var b=mk("button",{fontFamily:FB,fontSize:"10px",letterSpacing:"0.1em",color:active?Cs:Ci,background:active?Ci:"transparent",border:"1px solid "+Cm,padding:"4px 10px",borderRadius:"2px",cursor:"pointer"},lab);
    b.addEventListener("click",function(){mealsRecipeScale[id]=sv;render();});
    chipRow.appendChild(b);
  });
  var scaleCard=card();
  scaleCard.appendChild(lbl("Scale"));
  scaleCard.appendChild(chipRow);

  function fmtQty(it){
    var parts=[];
    if(it.g){var g=Math.round(it.g*scale);parts.push(gToOz(g)+" oz / "+g+" g");}
    else if(it.oz){var oz=Math.round(it.oz*scale*10)/10;parts.push(oz+" oz / "+ozToG(oz)+" g");}
    if(it.ea)parts.push(Math.round(it.ea*scale*100)/100+" each");
    if(it.tsp)parts.push(Math.round(it.tsp*scale*10)/10+" tsp");
    if(it.tbsp)parts.push(Math.round(it.tbsp*scale*10)/10+" Tbsp");
    if(it.cup)parts.push(Math.round(it.cup*scale*100)/100+" cup");
    return parts.join(" · ");
  }
  var ingCard=card();

    if(it.swap_from)ingCard.appendChild(mk("div",{fontFamily:FB,fontSize:"9px",color:Cm,padding:"0 0 4px 8px"},"↳ subbed for: "+it.swap_from));
  }
  wrap.appendChild(ingCard);

  var stepCard=card();
  stepCard.appendChild(lbl("Method"));
  var steps=STEPS[id]||[];
  for(var i=0;i<steps.length;i++){
    var srow=dv({display:"flex",gap:"12px",alignItems:"flex-start",padding:"8px 0",borderBottom:"1px dotted "+Cm});

    stepCard.appendChild(srow);
  }
  wrap.appendChild(stepCard);

  return wrap;
}

    wrap.appendChild(hdr);

    var actions=dv({display:"flex",gap:"6px",margin:"4px 0"});
    var addBtn=mk("button",{flex:"1",fontFamily:FB,fontSize:"11px",letterSpacing:"0.15em",padding:"10px",background:Ci,color:Cs,border:"none",borderRadius:"2px",cursor:"pointer"},"+ ADD REP");
    addBtn.addEventListener("click",function(){
      var def_d=SPRINT_DEFAULT_DIST[current.type]||40;
      var dist=parseFloat(prompt("Distance (m)?",def_d));
      if(!dist) return;
      var tm=parseFloat(prompt("Time (seconds)?",""));
      if(!tm||isNaN(tm)) return;
      var rpe=parseFloat(prompt("RPE (1-10)?","9"));
      var note=prompt("Rep notes (optional):","");
      current.reps.push({distance:dist,time:tm,rpe:rpe||0,notes:note||""});
      var prKey=String(dist);
      if(!D.sprint.prs[prKey]||tm<D.sprint.prs[prKey].time){
        D.sprint.prs[prKey]={time:tm,date:current.date,session_id:current.id};
        alert("NEW PR · "+dist+"m in "+tm.toFixed(2)+"s");
      }
      saveData(D);render();
    });
    actions.appendChild(addBtn);
    var endBtn=mk("button",{flex:"1",fontFamily:FB,fontSize:"11px",letterSpacing:"0.15em",padding:"10px",background:Cr,color:Cs,border:"none",borderRadius:"2px",cursor:"pointer"},"END SESSION");
    endBtn.addEventListener("click",function(){
      current.done=true;
      sprintPickType=null;
      saveData(D);render();
    });
    actions.appendChild(endBtn);
    var cancelBtn=mk("button",{flex:"1",fontFamily:FB,fontSize:"11px",letterSpacing:"0.15em",padding:"10px",background:"transparent",color:Ci,border:"1px solid "+Ci,borderRadius:"2px",cursor:"pointer"},"CANCEL");
    cancelBtn.addEventListener("click",function(){
      if(!confirm("Discard the current in-progress session?")) return;
      for(var k=D.sprint.sessions.length-1;k>=0;k--){
        if(!D.sprint.sessions[k].done){D.sprint.sessions.splice(k,1);break;}
      }
      saveData(D);render();
    });
    actions.appendChild(cancelBtn);
    wrap.appendChild(actions);

    var repsCard=card();
    repsCard.appendChild(lbl("Reps"));
    if(current.reps.length===0){
      repsCard.appendChild(mk("div",{fontFamily:FB,fontSize:"11px",color:Cm,fontStyle:"italic",padding:"6px 0"},"No reps yet — tap ADD REP."));
    }else{
      for(var i=0;i<current.reps.length;i++){
        var r=current.reps[i];
        var row=dv({display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:"1px dotted "+Cm,fontFamily:FB,fontSize:"11px"});
        row.appendChild(mk("span",{},"#"+(i+1)+"  "+r.distance+"m"));
        row.appendChild(mk("span",{},r.time.toFixed(2)+"s  ·  RPE "+r.rpe+(r.notes?"  ·  "+r.notes:"")));
        repsCard.appendChild(row);
      }
    }
    wrap.appendChild(repsCard);
  } else {
    // start-a-session form
    var startCard=card();
    startCard.appendChild(lbl("Start a Session"));

    startCard.appendChild(mk("div",{fontFamily:FB,fontSize:"10px",color:Cm,marginBottom:"4px",marginTop:"4px"},"Type"));
    var typeRow=dv({display:"flex",flexWrap:"wrap",gap:"4px",marginBottom:"6px"});
    for(var i=0;i<SPRINT_TYPES.length;i++){
      (function(t){
        var active=sprintPickType===t.id;
        var b=mk("button",{fontFamily:FB,fontSize:"10px",letterSpacing:"0.1em",color:active?Cs:Ci,background:active?Ci:"transparent",border:"1px solid "+Cm,padding:"4px 10px",borderRadius:"2px",cursor:"pointer"},t.label);
        b.addEventListener("click",function(){sprintPickType=t.id;render();});
        typeRow.appendChild(b);
      })(SPRINT_TYPES[i]);
    }
    startCard.appendChild(typeRow);
    if(sprintPickType){
      startCard.appendChild(mk("div",{fontFamily:FB,fontSize:"10px",color:Cm,fontStyle:"italic",marginBottom:"10px"},sprintTypeById(sprintPickType).desc));
    }

    startCard.appendChild(mk("div",{fontFamily:FB,fontSize:"10px",color:Cm,marginBottom:"4px"},"Surface"));
    var surfRow=dv({display:"flex",flexWrap:"wrap",gap:"4px",marginBottom:"10px"});
    for(var i=0;i<SPRINT_SURFACES.length;i++){
      (function(s){
        var active=sprintPickSurface===s;
        var b=mk("button",{fontFamily:FB,fontSize:"10px",letterSpacing:"0.1em",color:active?Cs:Ci,background:active?Ci:"transparent",border:"1px solid "+Cm,padding:"4px 10px",borderRadius:"2px",cursor:"pointer"},s);
        b.addEventListener("click",function(){sprintPickSurface=s;render();});
        surfRow.appendChild(b);
      })(SPRINT_SURFACES[i]);
    }
    startCard.appendChild(surfRow);

    startCard.appendChild(mk("div",{fontFamily:FB,fontSize:"10px",color:Cm,marginBottom:"4px"},"Pre-fatigue state"));
    var fatRow=dv({display:"flex",flexWrap:"wrap",gap:"4px",marginBottom:"10px"});
    for(var i=0;i<SPRINT_FATIGUE.length;i++){
      (function(f){
        var active=sprintPickFatigue===f;
        var b=mk("button",{fontFamily:FB,fontSize:"10px",letterSpacing:"0.1em",color:active?Cs:Ci,background:active?Ci:"transparent",border:"1px solid "+Cm,padding:"4px 10px",borderRadius:"2px",cursor:"pointer"},f);
        b.addEventListener("click",function(){sprintPickFatigue=f;render();});
        fatRow.appendChild(b);
      })(SPRINT_FATIGUE[i]);
    }
    startCard.appendChild(fatRow);

    var canStart=!!sprintPickType;
    var startBtn=mk("button",{width:"100%",fontFamily:FB,fontSize:"12px",letterSpacing:"0.2em",padding:"14px",background:canStart?Ci:Cm,color:Cs,border:"none",borderRadius:"2px",cursor:canStart?"pointer":"default",opacity:canStart?"1":"0.55"},
      canStart?("START "+sprintTypeById(sprintPickType).label.toUpperCase()+" SESSION"):"PICK A TYPE FIRST");
    if(canStart){
      startBtn.addEventListener("click",function(){
        var wind=prompt("Wind speed (m/s, signed, blank for none). + tailwind, − headwind:","");
        var notes=prompt("Session notes (optional):","");
        var d=new Date();
        var iso=d.getFullYear()+"-"+("0"+(d.getMonth()+1)).slice(-2)+"-"+("0"+d.getDate()).slice(-2);
        var hm=("0"+d.getHours()).slice(-2)+":"+("0"+d.getMinutes()).slice(-2);
        D.sprint.sessions.push({
          id:d.getTime(),date:iso,time:hm,
          type:sprintPickType,surface:sprintPickSurface,
          wind:wind?parseFloat(wind):0,fatigue:sprintPickFatigue,
          notes:notes||"",reps:[],done:false
        });
        saveData(D);render();
      });
    }
    startCard.appendChild(startBtn);
    wrap.appendChild(startCard);
  }

  // PRs
  var prCard=card();
  prCard.appendChild(lbl("Personal Records"));
  for(var i=0;i<SPRINT_DISTANCES.length;i++){
    var dist=SPRINT_DISTANCES[i];
    var pr=D.sprint.prs[dist];
    var prRow=dv({display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:"1px dotted "+Cm,fontFamily:FB,fontSize:"11px"});
    prRow.appendChild(mk("span",{color:Ci},dist+"m"));
    prRow.appendChild(mk("span",{color:pr?Ci:Cm},pr?(pr.time.toFixed(2)+"s  ·  "+pr.date):"—"));
    prCard.appendChild(prRow);
  }
  wrap.appendChild(prCard);

  // History
  var histCard=card();
  histCard.appendChild(lbl("Recent Sessions"));
  var count=0;
  for(var i=D.sprint.sessions.length-1;i>=0 && count<8;i--){
    var s=D.sprint.sessions[i];
    if(!s.done) continue;
    count++;
    var styp=sprintTypeById(s.type);var slabel=styp?styp.label:s.type;
    var best=null;
    for(var j=0;j<s.reps.length;j++){
      if(!best||s.reps[j].time<best.time) best=s.reps[j];
    }
    var bestStr=best?(best.distance+"m in "+best.time.toFixed(2)+"s"):"no reps";
    var sRow=dv({padding:"6px 0",borderBottom:"1px dotted "+Cm});
    var sTop=dv({display:"flex",justifyContent:"space-between",fontFamily:FB,fontSize:"11px"});
    sTop.appendChild(mk("span",{color:Ci},s.date+"  ·  "+slabel));
    sTop.appendChild(mk("span",{color:Cm},s.reps.length+" reps"));
    sRow.appendChild(sTop);
    sRow.appendChild(mk("div",{fontFamily:FB,fontSize:"10px",color:Cm,marginTop:"2px"},"best: "+bestStr+(s.notes?"  ·  \""+s.notes+"\"":"")));
    histCard.appendChild(sRow);
  }
  if(count===0){
    histCard.appendChild(mk("div",{fontFamily:FB,fontSize:"11px",color:Cm,fontStyle:"italic",padding:"6px 0"},"No completed sessions yet."));
  }
  wrap.appendChild(histCard);

  return wrap;
}


function renderCoach(){
  var wrap = dv({display:"flex",flexDirection:"column",gap:"10px"});
  var ctx = buildTrainingContext();

  // Mode selector
  var modeCard = card({padding:"10px"});
  var modeRow = dv({display:"flex",gap:"6px",flexWrap:"wrap"});
  var modes = [
    {id:"wod",label:"WOD Suggestion"},
    {id:"weekly",label:"Weekly Review"},
    {id:"plateau",label:"Plateau Advice"},
    {id:"balance",label:"Balance Check"}
  ];
  for(var mi=0;mi<modes.length;mi++){
    (function(m){
      var active = coachState.mode===m.id;
      var b = mk("button",{fontFamily:FB,fontSize:"10px",color:active?Cs:Ci,background:active?Ci:"transparent",border:"1px solid "+(active?Ci:Cm),padding:"4px 10px",borderRadius:"2px",cursor:"pointer"},m.label);
      b.addEventListener("click",function(){coachState.mode=m.id;coachState.response="";coachState.error="";render();});
      modeRow.appendChild(b);
    })(modes[mi]);
  }
  modeCard.appendChild(modeRow);
  wrap.appendChild(modeCard);

  // Context snapshot
  var snapCard = card({background:Cy});
  snapCard.appendChild(mk("div",{fontFamily:FH,fontSize:"12px",color:Cm,marginBottom:"6px"},"Current Training Context"));
  var snapLines = [
    "Sessions this week: "+ctx.sessionsThisWeek+" (last week: "+ctx.sessionsLastWeek+")",
    "Days since last session: "+(ctx.daysSinceLastSession!==null?ctx.daysSinceLastSession:"n/a"),
    "Split: "+ctx.split+" | "+ctx.setsPerExercise+" sets | "+ctx.repScheme+" scheme",
    "Push:Pull sets (7d): "+ctx.pushSets7d+":"+ctx.pullSets7d+(ctx.pushPullRatio?" ("+ctx.pushPullRatio+":1)":""),
    "Ready to advance: "+(ctx.readyToAdvance.length>0?ctx.readyToAdvance.join(", "):"none yet"),
    ctx.bodyComp?"Body comp: "+(ctx.bodyComp.weight||"?")+"lbs / "+(ctx.bodyComp.bfPct||"?")+"% BF":"Body comp: not logged"
  ];
  for(var si=0;si<snapLines.length;si++) snapCard.appendChild(tw(snapLines[si],{color:Cm,fontSize:"10px",marginBottom:"2px"}));
  wrap.appendChild(snapCard);

  // Generate button
  var btnLabel = {wod:"Generate Today's WOD",weekly:"Generate Weekly Review",plateau:"Get Plateau Advice",balance:"Check Push/Pull Balance"}[coachState.mode];
  var genBtn = mk("button",{fontFamily:FH,fontSize:"14px",color:Cs,background:coachState.loading?"#666":Ci,border:"1px solid "+Ci,padding:"12px 0",borderRadius:"2px",cursor:"pointer",width:"100%",display:"block",opacity:coachState.loading?"0.6":"1"},coachState.loading?"Analyzing your training...":btnLabel);

  genBtn.addEventListener("click",function(){
    if(coachState.loading)return;
    coachState.loading=true;coachState.response="";coachState.error="";render();

    var ctx2 = buildTrainingContext();
    var ctxJson = JSON.stringify(ctx2,null,2);
    var today = new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});

    var NL = "\n";
    var prompts = {
      wod: "Today is "+today+". Based on my training data, generate a specific Workout of the Day."+NL+NL+"My training context:"+NL+ctxJson+NL+NL+"Please provide:"+NL+"1. Which categories to train today and why (based on frequency, recovery, push/pull balance)"+NL+"2. For each category: the specific exercise, target sets x reps/seconds, and modifier recommendation"+NL+"3. Suggested rest times between sets"+NL+"4. One technique cue for any exercise where I am close to advancing"+NL+"5. Overall session RPE target"+NL+NL+"Be specific. Reference my actual exercises and numbers.",
      weekly: "Today is "+today+". Review my training week and give me a coaching analysis."+NL+NL+"My training context:"+NL+ctxJson+NL+NL+"Please provide:"+NL+"1. Volume and frequency assessment vs OG recommendations"+NL+"2. Progress highlights - what is trending up"+NL+"3. Lagging areas that need attention"+NL+"4. Push/pull structural balance assessment (OG says imbalances cause shoulder injuries)"+NL+"5. Top 3 specific adjustments for next week"+NL+"6. Body comp context if available",
      plateau: "I want advice on breaking through plateaus in my training."+NL+NL+"My training context:"+NL+ctxJson+NL+NL+"Please:"+NL+"1. Identify which exercises have stalled (low readiness, same numbers over time)"+NL+"2. For each stalled exercise, give 2-3 OG-based strategies (rep scheme changes, eccentrics, iso work, deload)"+NL+"3. Check if overall volume is too high or too low"+NL+"4. Suggest periodization adjustments based on my level"+NL+"5. Flag structural imbalances that might be limiting progress",
      balance: "Analyze my push/pull structural balance."+NL+NL+"My training context:"+NL+ctxJson+NL+NL+"Please:"+NL+"1. Assess my push/pull set ratio (OG recommends 1:1, with extra horizontal pulling for shoulder health)"+NL+"2. Check if I am training OG-recommended prehab movements (back lever for shoulder ext, L-sit for core)"+NL+"3. Identify dangerous imbalances (OG author injured his shoulder from too much push)"+NL+"4. Give specific prescription to correct any imbalances"+NL+"5. Flag exercises to prioritize or deprioritize based on my current levels"
    };

    var sysPrompt = "You are an expert performance coach for a multi-discipline athlete. Calisthenics core methodology is Steven Low's Overcoming Gravity 2nd Edition (OG2). You have access to the athlete's real training data across SIX domains: (1) CALISTHENICS — OG2 progressions; SAID, structural balance (push:pull), linear progression, iso 1-rep = 2s at 60-75% max hold, eccentrics as bridge tools, full-body for beginners. SESSION STRUCTURE: mobility warm-up → power/plyo (CNS-fresh, low-rep, 3-min rest, NOT to failure) → strength core → control/tempo cool-down. (2) SPRINT — masters T&F + Hyrox prep. Track 1RM-equivalent PRs per distance (20/40/60/100/200/400/800/1000/1600m); types include accel / max_v / fly / tempo / hill / resisted / hyrox-1k. (3) ANKLE-FOOT REHAB — six categories (intrinsics, dorsiflexors, plantarflexors, ankle mobility, balance, plyo). Daily-maintenance categories should be touched most days; strength uses progression ladders. Alfredson eccentric protocol (3×15 BID, both straight + bent knee) is the gold standard for Achilles. (4) MARTIAL ARTS — tracked as time only (separate training program). Just visibility. (5) HYROX — 8 stations + 1km runs. PRs per station at standard target. (6) MEALS + IF — pescatarian-first rotation, 18:6 floating window, macros from Mifflin-St Jeor → cut deficit → P/F/C split → per-meal split. Supplement stack: creatine, caffeine+theanine, whey, omega-3, vit D, magnesium, melatonin. ATHLETE GOAL: lean year-round (single-digit BF), Baki/Yujiro physique = the STRIKER archetype (high Power Output + Leanness, mid-high Relative Strength + Flexibility, moderate Muscle Mass + Skill). Multi-domain readiness, masters T&F competition, Hyrox events. Be direct, specific, and reference their actual numbers and exercises. Note interactions across domains (e.g. a heavy sprint day affects calisthenics readiness; an IF window violation affects recovery; tib weakness limits sprint progression). No generic advice.";

    callClaude(prompts[coachState.mode], sysPrompt, function(err, text){
      coachState.loading=false;
      if(err){coachState.error=err;}else{coachState.response=text;}
      render();
    });
  });
  wrap.appendChild(genBtn);

  // Error
  if(coachState.error){
    wrap.appendChild(tw("Error: "+coachState.error,{color:Cr,fontSize:"12px",padding:"8px 0"}));
  }

  // Response
  if(coachState.response){
    var respCard = card({background:Cy,borderLeft:"3px solid "+Ci});
    respCard.appendChild(mk("div",{fontFamily:FH,fontSize:"13px",color:Ci,marginBottom:"10px",borderBottom:"1px solid "+Cl,paddingBottom:"6px"},"Coach Analysis"));
    // Render response with basic paragraph formatting
    var paras = coachState.response.split("\n");
    for(var pi=0;pi<paras.length;pi++){
      var para = paras[pi].trim();
      if(!para)continue;
      var isHeader = para.match(/^[0-9]+[.]/) || para.match(/^[#]+/) || (para.length<60 && para[para.length-1]===":");
      var pEl = mk("div",{fontFamily:isHeader?FH:FB,fontSize:isHeader?"13px":"12px",color:isHeader?Ci:Cm,marginBottom:isHeader?"6px":"3px",fontWeight:isHeader?"bold":"normal",lineHeight:"1.6"},para.replace(/^[#]+ */,"").replace(/[*][*]/g,""));
      respCard.appendChild(pEl);
    }
    wrap.appendChild(respCard);

    // Quick-apply WOD button (only for WOD mode)
    if(coachState.mode==="wod"){
      var applyNote = card({background:"#e8f0e8",borderLeft:"3px solid "+Cg});
      applyNote.appendChild(tw("Review the AI suggestion above, then head to the TODAY tab to log your session. Your current progressions are already set — the coach suggestion is a guide, not an override.",{color:Cg,fontSize:"11px"}));
      wrap.appendChild(applyNote);
    }
  }

  // No data warning
  if(ctx.totalSessions<3){
    var noData = card({borderLeft:"3px solid "+Cm});
    noData.appendChild(tw("Log at least 3 sessions first for the AI to have meaningful data to analyze. The more you log, the more specific the coaching.",{color:Cm,fontSize:"11px",fontStyle:"italic"}));
    wrap.appendChild(noData);
  }

  return wrap;
}


function renderSettings(){
  var wrap=dv({display:"flex",flexDirection:"column",gap:"10px"});var s=D.settings;
  var sc=card();sc.appendChild(lbl("Workout Split"));sc.appendChild(tw("OG recommends full-body for beginners. Splits work when volume stays moderate.",{color:Cm,marginBottom:"8px",fontSize:"11px",fontStyle:"italic"}));
  var sk=Object.keys(SPLITS);
  for(var si=0;si<sk.length;si++){
    (function(key){var sp=SPLITS[key];var active=s.split===key;
      var row=dv({display:"flex",alignItems:"flex-start",gap:"8px",padding:"8px",marginBottom:"4px",background:active?"#e8e0d0":"transparent",border:"1px solid "+(active?Ci:Cl),borderRadius:"2px",cursor:"pointer"});
      row.appendChild(mk("div",{width:"12px",height:"12px",borderRadius:"50%",border:"2px solid "+(active?Ci:Cm),background:active?Ci:"transparent",marginTop:"2px",flexShrink:"0"}));
      var info=dv({});info.appendChild(mk("div",{fontFamily:FH,fontSize:"13px",color:active?Ci:Cm},sp.name));info.appendChild(tw(sp.desc,{color:Cm,fontSize:"10px"}));row.appendChild(info);
      row.addEventListener("click",function(){D.settings.split=key;saveData(D);render();});sc.appendChild(row);
    })(sk[si]);
  }
  wrap.appendChild(sc);
  var setC=card();setC.appendChild(lbl("Sets Per Exercise"));setC.appendChild(tw("Research: 2-3 sets optimal for high-frequency training.",{color:Cm,marginBottom:"8px",fontSize:"11px",fontStyle:"italic"}));
  var sr=dv({display:"flex",gap:"6px"});
  for(var ni=1;ni<=5;ni++){
    (function(n){var active=parseInt(s.sets||3)===n;
      var b=mk("button",{flex:"1",padding:"8px 0",textAlign:"center",fontFamily:FH,fontSize:"16px",color:active?Cs:Ci,background:active?Ci:"transparent",border:"1px solid "+(active?Ci:Cm),borderRadius:"2px",cursor:"pointer"},String(n));
      b.addEventListener("click",function(){D.settings.sets=n;saveData(D);render();});sr.appendChild(b);
    })(ni);
  }
  setC.appendChild(sr);wrap.appendChild(setC);
  var repC=card();repC.appendChild(lbl("Rep Scheme"));
  var reps=[{id:"failure",name:"To Failure",note:"OG standard. Maximum reps each set."},{id:"rpe",name:"RPE 8-9 (RIR 1-2)",note:"Leave 1-2 reps in reserve. Best for high-frequency."},{id:"fixed",name:"Fixed Target",note:"Exact OG level target reps."}];
  for(var ri=0;ri<reps.length;ri++){
    (function(rs){var active=s.repScheme===rs.id;
      var row=dv({display:"flex",gap:"8px",alignItems:"flex-start",padding:"8px",marginBottom:"4px",background:active?"#e8e0d0":"transparent",border:"1px solid "+(active?Ci:Cl),borderRadius:"2px",cursor:"pointer"});
      row.appendChild(mk("div",{width:"12px",height:"12px",borderRadius:"50%",border:"2px solid "+(active?Ci:Cm),background:active?Ci:"transparent",marginTop:"2px",flexShrink:"0"}));
      var info=dv({});info.appendChild(mk("div",{fontFamily:FH,fontSize:"12px",color:active?Ci:Cm},rs.name));info.appendChild(tw(rs.note,{color:Cm,fontSize:"10px",fontStyle:"italic"}));row.appendChild(info);
      row.addEventListener("click",function(){D.settings.repScheme=rs.id;saveData(D);render();});repC.appendChild(row);
    })(reps[ri]);
  }
  wrap.appendChild(repC);
  var pc=card();pc.appendChild(lbl("Current Progressions"));pc.appendChild(mk("hr",{border:"none",borderTop:"1px solid "+Cm,margin:"6px 0"}));
  var ok=Object.keys(OG);
  for(var oi=0;oi<ok.length;oi++){
    (function(k){var c=OG[k];var curr=D.progressions[k];var ex=curr?findEx(k,curr):null;
      var row=dv({display:"flex",alignItems:"center",gap:"7px",padding:"4px 0",borderBottom:"1px dashed "+Cl});
      row.appendChild(mk("span",{color:c.color,fontSize:"11px",minWidth:"14px"},c.icon));
      row.appendChild(tw(c.label,{color:Cm,minWidth:"120px",fontSize:"10px"}));
      row.appendChild(mk("span",{flex:"1",fontFamily:FH,fontSize:"12px",color:ex?Ci:Cm,fontStyle:ex?"normal":"italic"},ex?ex.name:"not set"));
      if(ex)row.appendChild(stamp("L"+ex.level,Cm));pc.appendChild(row);
    })(ok[oi]);
  }
  wrap.appendChild(pc);return wrap;
}

render();
</script>
