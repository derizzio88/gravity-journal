var LEGACY_KEYS=["gravity_og_v1","gravity_og_v2","gravity_og_v3"];
(function migrate(){

// ── EXPORT: download data as JSON file ────────────────────────────────────────
function exportData(){

  var url=URL.createObjectURL(blob);
  var a=document.createElement("a");
  a.href=url;
  a.download="gravity-journal-backup-"+new Date().toISOString().split("T")[0]+".json";
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ── IMPORT: restore from JSON backup file ────────────────────────────────────
function importData(file,callback){
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var d=JSON.parse(e.target.result);
      // Validate structure
      if(!d.sessions||!Array.isArray(d.sessions)){callback("Invalid backup file - missing sessions.");return;}
      // Merge: keep newer sessions, don't overwrite
      var existing=loadData();
      var existingIds={};
      for(var i=0;i<existing.sessions.length;i++)existingIds[existing.sessions[i].id]=true;
      var newSessions=d.sessions.filter(function(s){return!existingIds[s.id];});
      var merged={
        sessions:existing.sessions.concat(newSessions).sort(function(a,b){return a.date>b.date?1:-1;}),
        progressions:Object.assign({},d.progressions||{},existing.progressions),
        bodyComp:existing.bodyComp||d.bodyComp||[],
        settings:existing.settings||d.settings||{}
      };
      saveData(merged);
      callback(null,newSessions.length+" new sessions merged, "+existing.sessions.length+" existing kept.");
    }catch(err){callback("Could not parse backup file: "+err.message);}
  };
  reader.readAsText(file);
}

function getTh(catKey,exId){
  var cat=OG[catKey];if(!cat)return{val:10,type:"con"};
  var ex=null;for(var i=0;i<cat.progressions.length;i++)if(cat.progressions[i].id===exId){ex=cat.progressions[i];break;}
  if(!ex)return{val:10,type:"con"};
  var idx=typeof ex.level==="number"?Math.min(Math.max(0,ex.level-1),cat.rt.length-1):2;
  var repVal=cat.rt[idx]||8;
  // OG: 1 rep = ~2s iso hold. Working set = 60-75% of max, use 65% midpoint.
  var val=ex.type==="iso"?Math.round(repVal*2*0.65):repVal;
  return{val:val,type:ex.type};
}
function calcR(sessions,catKey,exId){
  var th=getTh(catKey,exId),sets=[],recent=sessions.slice(-21);
  for(var i=0;i<recent.length;i++)for(var j=0;j<recent[i].sets.length;j++){var b=recent[i].sets[j];if(b.category===catKey&&b.exerciseId===exId&&b.modifier==="std")sets.push(b);}
  if(sets.length<2)return{ready:false,pct:0,avg:0,target:th.val,type:th.type};
  var total=0;for(var k=0;k<sets.length;k++)total+=(th.type==="iso"?(sets[k].seconds||0):(sets[k].reps||0));
  var avg=total/sets.length,pct=Math.min(100,Math.round(avg/th.val*100));
  return{ready:avg>=th.val,pct:pct,avg:Math.round(avg*10)/10,target:th.val,type:th.type};
}

// Builds a rich summary of the athlete's current state for the AI
function buildTrainingContext(){
  var d = D;
  var ctx = {};

  // Recent session frequency
  var now = Date.now();
  var day7 = now - 7*86400000;
  var day14 = now - 14*86400000;
  var sessions7 = d.sessions.filter(function(s){return new Date(s.date).getTime()>=day7;});
  var sessions14 = d.sessions.filter(function(s){return new Date(s.date).getTime()>=day14&&new Date(s.date).getTime()<day7;});
  ctx.sessionsThisWeek = sessions7.length;
  ctx.sessionsLastWeek = sessions14.length;
  ctx.totalSessions = d.sessions.length;

  // Date of last session
  if(d.sessions.length>0){
    var lastSess = d.sessions[d.sessions.length-1];
    ctx.lastSessionDate = lastSess.date;
    var daysSince = Math.round((now - new Date(lastSess.date).getTime()) / 86400000);
    ctx.daysSinceLastSession = daysSince;
  } else {
    ctx.lastSessionDate = null;
    ctx.daysSinceLastSession = null;
  }

  // Current progressions + readiness
  var ogKeys = Object.keys(OG);
  ctx.progressions = [];
  ctx.readyToAdvance = [];
  ctx.recentBests = {};

  for(var i=0;i<ogKeys.length;i++){
    var catKey = ogKeys[i];
    var cat = OG[catKey];
    var currId = d.progressions[catKey];
    if(!currId) continue;
    var ex = findEx(catKey,currId);
    if(!ex) continue;
    var th = getTh(catKey,currId);
    var r = calcR(d.sessions,catKey,currId);

    // Recent performance for this exercise
    var recentSets = [];
    var recent = d.sessions.slice(-14);
    for(var j=0;j<recent.length;j++){
      for(var k=0;k<recent[j].sets.length;k++){
        var b=recent[j].sets[k];
        if(b.category===catKey&&b.exerciseId===currId&&b.modifier==="std") recentSets.push(b);
      }
    }
    var avgVal = 0;
    if(recentSets.length>0){
      var total=0;for(var j=0;j<recentSets.length;j++)total+=(ex.type==="iso"?(recentSets[j].seconds||0):(recentSets[j].reps||0));
      avgVal = Math.round((total/recentSets.length)*10)/10;
    }

    var progEntry = {
      category: cat.label,
      exercise: ex.name,
      level: ex.level,
      type: ex.type==="iso"?"isometric":"dynamic",
      target: th.val+(ex.type==="iso"?"s":" reps"),
      avgRecent: avgVal+(ex.type==="iso"?"s":" reps"),
      readinessPct: r.pct,
      readyToAdvance: r.ready,
      setCount: recentSets.length
    };
    ctx.progressions.push(progEntry);
    if(r.ready) ctx.readyToAdvance.push(cat.label+": "+ex.name);
  }

  // Body composition (latest + trends)
  if(d.bodyComp&&d.bodyComp.length>0){
    var latest = d.bodyComp[d.bodyComp.length-1];
    ctx.bodyComp = {
      date:latest.date,
      weight:latest.weight,
      bfPct:latest.bf_pct,
      muscleLbs:latest.muscle,
      visceralFat:latest.visceral,
      bodyWaterPct:latest.water,
      boneMassLbs:latest.bone,
      metabolicAge:latest.metabolicAge,
      bmi:latest.bmi,
      segmental:latest.segmental||null
    };
    // Trends over last 3 scans
    if(d.bodyComp.length>=3){
      var older = d.bodyComp[d.bodyComp.length-3];
      if(older.weight&&latest.weight) ctx.bodyComp.weightTrend = Math.round((latest.weight-older.weight)*10)/10;
      if(older.bf_pct&&latest.bf_pct) ctx.bodyComp.bfTrend = Math.round((latest.bf_pct-older.bf_pct)*10)/10;
      if(older.muscle&&latest.muscle) ctx.bodyComp.muscleTrend = Math.round((latest.muscle-older.muscle)*10)/10;
      if(older.visceral&&latest.visceral) ctx.bodyComp.visceralTrend = Math.round((latest.visceral-older.visceral)*10)/10;
    }
    // Segmental imbalance if available
    if(latest.segmental&&latest.segmental.armL_muscle&&latest.segmental.armR_muscle){
      var leftLimb=(latest.segmental.armL_muscle||0)+(latest.segmental.legL_muscle||0);
      var rightLimb=(latest.segmental.armR_muscle||0)+(latest.segmental.legR_muscle||0);
      if(leftLimb>0&&rightLimb>0){
        ctx.bodyComp.limbImbalancePct=Math.round(Math.abs(leftLimb-rightLimb)/((leftLimb+rightLimb)/2)*1000)/10;
      }
    }
  } else {
    ctx.bodyComp = null;
  }

  // Split and settings
  ctx.split = (SPLITS[d.settings.split]||SPLITS.fullbody).name;
  ctx.setsPerExercise = d.settings.sets||3;
  ctx.repScheme = d.settings.repScheme||"failure";

  // Volume balance (push vs pull sets this week)
  var pushSets=0,pullSets=0;
  for(var i=0;i<sessions7.length;i++){
    for(var j=0;j<sessions7[i].sets.length;j++){
      var b=sessions7[i].sets[j];
      if(b.category==="push"||b.category==="dip_mu"||b.category==="handstand") pushSets++;
      if(b.category==="pull"||b.category==="backlever") pullSets++;
    }
  }
  ctx.pushSets7d = pushSets;
  ctx.pullSets7d = pullSets;
  ctx.pushPullRatio = pullSets>0?Math.round((pushSets/pullSets)*10)/10:null;

  return ctx;
}

function callClaude(prompt, systemPrompt, callback){
  var req = new XMLHttpRequest();
  req.open("POST","https://api.anthropic.com/v1/messages",true);
  req.setRequestHeader("Content-Type","application/json");
  req.onload = function(){
    try{
      var d = JSON.parse(req.responseText);
      var text = "";
      if(d.content&&d.content.length>0){
        for(var i=0;i<d.content.length;i++) if(d.content[i].type==="text") text+=d.content[i].text;
      }
      callback(null,text||"No response received.");
    }catch(e){callback("Parse error: "+e.message,null);}
  };
  req.onerror = function(){callback("Network error — check connection.",null);};
  req.send(JSON.stringify({
    model:"claude-sonnet-4-20250514",
    max_tokens:1000,
    system:systemPrompt,
    messages:[{role:"user",content:prompt}]
  }));
}

      date:new Date().toISOString().split("T")[0],
      weight:pf(bodyEntry.weight),
      bf_pct:pf(bodyEntry.bf),
      muscle:pf(bodyEntry.muscle),
      visceral:pf(bodyEntry.visceral),
      water:pf(bodyEntry.water),
      bone:pf(bodyEntry.bone),
      metabolicAge:pf(bodyEntry.metabolicAge),
      bmi:pf(bodyEntry.bmi),
      segmental:{
        armL_muscle:pf(bodyEntry.armL_muscle),armR_muscle:pf(bodyEntry.armR_muscle),
        trunk_muscle:pf(bodyEntry.trunk_muscle),
        legL_muscle:pf(bodyEntry.legL_muscle),legR_muscle:pf(bodyEntry.legR_muscle),
        armL_fat:pf(bodyEntry.armL_fat),armR_fat:pf(bodyEntry.armR_fat),
        trunk_fat:pf(bodyEntry.trunk_fat),
        legL_fat:pf(bodyEntry.legL_fat),legR_fat:pf(bodyEntry.legR_fat)
      },
      notes:bodyEntry.notes||""
    };
    if(!D.bodyComp)D.bodyComp=[];
    D.bodyComp.push(entry);
    saveData(D);
    // Reset entry
    bodyEntry={weight:"",bf:"",muscle:"",visceral:"",water:"",bone:"",metabolicAge:"",bmi:"",armL_muscle:"",armR_muscle:"",trunk_muscle:"",legL_muscle:"",legR_muscle:"",armL_fat:"",armR_fat:"",trunk_fat:"",legL_fat:"",legR_fat:"",notes:""};
    bodySaved=true;setTimeout(function(){bodySaved=false;render();},2000);
    render();
  });
  form.appendChild(saveBtn);
  wrap.appendChild(form);

  // History / trends
  if(D.bodyComp&&D.bodyComp.length>0){
    var bc = D.bodyComp;
    var latest = bc[bc.length-1];
    var prev = bc.length>=2?bc[bc.length-2]:null;

    // Stat cards row
    var statRow = dv({display:"flex",gap:"6px",flexWrap:"wrap"});
    var statItems = [
      {l:"Weight",v:latest.weight,u:"lbs",prev:prev?prev.weight:null},
      {l:"Body Fat",v:latest.bf_pct,u:"%",prev:prev?prev.bf_pct:null,lower:1},
      {l:"Muscle",v:latest.muscle,u:"lbs",prev:prev?prev.muscle:null},
      {l:"Visceral",v:latest.visceral,u:"",prev:prev?prev.visceral:null,lower:1}
    ];
    for(var sti=0;sti<statItems.length;sti++){
      (function(item){
        if(item.v===null||item.v===undefined)return;
        var sc=card({flex:"1",minWidth:"80px",padding:"10px",marginBottom:"0"});
        sc.appendChild(lbl(item.l));
        sc.appendChild(mk("div",{fontFamily:FH,fontSize:"20px",color:Ci},(item.v||"-")+(item.u?" "+item.u:"")));
        if(item.prev!==null&&item.prev!==undefined&&item.v!==null){
          var diff=Math.round((item.v-item.prev)*10)/10;
          var better=item.lower?(diff<0):(diff>0);
          var diffStr=(diff>0?"+":"")+diff+(item.u?" "+item.u:"");
          sc.appendChild(mk("div",{fontFamily:FB,fontSize:"10px",color:diff===0?Cm:better?Cg:Cr},diffStr));
        }
        statRow.appendChild(sc);
      })(statItems[sti]);
    }
    wrap.appendChild(statRow);

    // Trend charts for key metrics
    var trendCard = card({marginTop:"4px"});
    trendCard.appendChild(mk("div",{fontFamily:FH,fontSize:"13px",color:Ci,marginBottom:"10px"},"Trends"));
    var trendMetrics = [
      {l:"Body Fat %",k:"bf_pct",lower:1},
      {l:"Muscle Mass (lbs)",k:"muscle",lower:0},
      {l:"Weight (lbs)",k:"weight",lower:0}
    ];
    var last8 = bc.slice(-8);
    for(var ti=0;ti<trendMetrics.length;ti++){
      (function(tm){
        var vals = last8.map(function(e){return e[tm.k];}).filter(function(v){return v!==null&&v!==undefined;});
        if(vals.length<2)return;
        trendCard.appendChild(lbl(tm.l));
        var chart = dv({display:"flex",alignItems:"flex-end",gap:"3px",height:"36px",marginBottom:"10px"});
        var maxV=0,minV=Infinity;
        for(var vi=0;vi<vals.length;vi++){if(vals[vi]>maxV)maxV=vals[vi];if(vals[vi]<minV)minV=vals[vi];}
        var range=maxV-minV||1;
        for(var vi=0;vi<vals.length;vi++){
          var h=Math.max(4,Math.round(((vals[vi]-minV)/range)*28)+4);
          var isLast=vi===vals.length-1;
          var prevV=vi>0?vals[vi-1]:null;
          var trend2=prevV!==null?(vals[vi]>prevV?"up":"down"):"new";
          var goodTrend=tm.lower?(trend2==="down"):(trend2==="up");
          var col=isLast?(goodTrend?Cg:trend2==="down"?Cr:Cm):Cl;
          var bw=dv({flex:"1",display:"flex",flexDirection:"column",alignItems:"center",gap:"2px"});
          bw.appendChild(dv({width:"100%",height:h+"px",background:col,borderRadius:"2px"}));
          bw.appendChild(mk("span",{fontSize:"8px",color:Cm,fontFamily:FB},String(vals[vi])));
          chart.appendChild(bw);
        }
        trendCard.appendChild(chart);
      })(trendMetrics[ti]);
    }
    wrap.appendChild(trendCard);

    // Segmental imbalance check (if data available)
    if(latest.segmental&&latest.segmental.armL_muscle&&latest.segmental.armR_muscle){
      var segCard = card();
      segCard.appendChild(mk("div",{fontFamily:FH,fontSize:"13px",color:Ci,marginBottom:"8px"},"Segmental Balance"));
      var leftMuscle = (latest.segmental.armL_muscle||0)+(latest.segmental.legL_muscle||0);
      var rightMuscle = (latest.segmental.armR_muscle||0)+(latest.segmental.legR_muscle||0);
      if(leftMuscle>0&&rightMuscle>0){
        var imbalance = Math.abs(leftMuscle-rightMuscle)/((leftMuscle+rightMuscle)/2)*100;
        var imbalStr = Math.round(imbalance*10)/10;
        segCard.appendChild(tw("Left limbs: "+Math.round(leftMuscle*10)/10+"lbs | Right limbs: "+Math.round(rightMuscle*10)/10+"lbs",{color:Cm,fontSize:"11px",marginBottom:"4px"}));
        segCard.appendChild(tw("Imbalance: "+imbalStr+"%"+(imbalance<5?" — within normal range":" — flag for coach"),{color:imbalance<5?Cg:Cr,fontSize:"11px",fontFamily:FH}));
      }
      wrap.appendChild(segCard);
    }

    // Full history table
    var histCard = card();
    histCard.appendChild(mk("div",{fontFamily:FH,fontSize:"13px",color:Ci,marginBottom:"8px"},"Scan History"));
    var headers = ["Date","Weight","BF%","Muscle","Visceral","Water%","Notes"];
    var hrow = dv({display:"flex",gap:"4px",marginBottom:"6px",borderBottom:"1px solid "+Cm,paddingBottom:"4px"});
    for(var hi=0;hi<headers.length;hi++) hrow.appendChild(mk("span",{flex:hi===0?"2":"1",fontSize:"8px",fontFamily:FH,color:Cm,textTransform:"uppercase",letterSpacing:"0.08em"},headers[hi]));
    histCard.appendChild(hrow);
    var histEntries = bc.slice().reverse().slice(0,10);
    for(var hei=0;hei<histEntries.length;hei++){
      (function(e,isLast){
        var row = dv({display:"flex",gap:"4px",padding:"5px 0",borderBottom:isLast?"none":"1px dashed "+Cl});
        function cell(v,u){return mk("span",{flex:"1",fontSize:"11px",fontFamily:FB,color:Ci},v!==null&&v!==undefined?String(v)+(u||""):"-");}
        row.appendChild(mk("span",{flex:"2",fontSize:"10px",fontFamily:FB,color:Cm},e.date));
        row.appendChild(cell(e.weight," lb"));
        row.appendChild(cell(e.bf_pct,"%"));
        row.appendChild(cell(e.muscle," lb"));
        row.appendChild(cell(e.visceral));
        row.appendChild(cell(e.water,"%"));
        row.appendChild(mk("span",{flex:"1",fontSize:"9px",fontFamily:FB,color:Cm,overflow:"hidden"},e.notes||""));
        histCard.appendChild(row);
      })(histEntries[hei],hei===histEntries.length-1);
    }
    wrap.appendChild(histCard);
  }

  return wrap;
}


function renderCoach(){
  var wrap = dv({display:"flex",flexDirection:"column",gap:"10px"});
  var ctx = buildTrainingContext();

  // Mode selector
  var modeCard = card({padding:"10px"});
  var modeRow = dv({display:"flex",gap:"6px",flexWrap:"wrap"});
  var modes = [
    {id:"wod",label:"WOD Suggestion"},
    {id:"weekly",label:"Weekly Review"},
    {id:"plateau",label:"Plateau Advice"},
    {id:"balance",label:"Balance Check"}
  ];
  for(var mi=0;mi<modes.length;mi++){
    (function(m){
      var active = coachState.mode===m.id;
      var b = mk("button",{fontFamily:FB,fontSize:"10px",color:active?Cs:Ci,background:active?Ci:"transparent",border:"1px solid "+(active?Ci:Cm),padding:"4px 10px",borderRadius:"2px",cursor:"pointer"},m.label);
      b.addEventListener("click",function(){coachState.mode=m.id;coachState.response="";coachState.error="";render();});
      modeRow.appendChild(b);
    })(modes[mi]);
  }
  modeCard.appendChild(modeRow);
  wrap.appendChild(modeCard);

  // Context snapshot
  var snapCard = card({background:Cy});
  snapCard.appendChild(mk("div",{fontFamily:FH,fontSize:"12px",color:Cm,marginBottom:"6px"},"Current Training Context"));
  var snapLines = [
    "Sessions this week: "+ctx.sessionsThisWeek+" (last week: "+ctx.sessionsLastWeek+")",
    "Days since last session: "+(ctx.daysSinceLastSession!==null?ctx.daysSinceLastSession:"n/a"),
    "Split: "+ctx.split+" | "+ctx.setsPerExercise+" sets | "+ctx.repScheme+" scheme",
    "Push:Pull sets (7d): "+ctx.pushSets7d+":"+ctx.pullSets7d+(ctx.pushPullRatio?" ("+ctx.pushPullRatio+":1)":""),
    "Ready to advance: "+(ctx.readyToAdvance.length>0?ctx.readyToAdvance.join(", "):"none yet"),
    ctx.bodyComp?"Body comp: "+(ctx.bodyComp.weight||"?")+"lbs / "+(ctx.bodyComp.bfPct||"?")+"% BF":"Body comp: not logged"
  ];
  for(var si=0;si<snapLines.length;si++) snapCard.appendChild(tw(snapLines[si],{color:Cm,fontSize:"10px",marginBottom:"2px"}));
  wrap.appendChild(snapCard);

  // Generate button
  var btnLabel = {wod:"Generate Today's WOD",weekly:"Generate Weekly Review",plateau:"Get Plateau Advice",balance:"Check Push/Pull Balance"}[coachState.mode];
  var genBtn = mk("button",{fontFamily:FH,fontSize:"14px",color:Cs,background:coachState.loading?"#666":Ci,border:"1px solid "+Ci,padding:"12px 0",borderRadius:"2px",cursor:"pointer",width:"100%",display:"block",opacity:coachState.loading?"0.6":"1"},coachState.loading?"Analyzing your training...":btnLabel);

  genBtn.addEventListener("click",function(){
    if(coachState.loading)return;
    coachState.loading=true;coachState.response="";coachState.error="";render();

    var ctx2 = buildTrainingContext();
    var ctxJson = JSON.stringify(ctx2,null,2);
    var today = new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});

    var NL = "\n";
    var prompts = {
      wod: "Today is "+today+". Based on my training data, generate a specific Workout of the Day."+NL+NL+"My training context:"+NL+ctxJson+NL+NL+"Please provide:"+NL+"1. Which categories to train today and why (based on frequency, recovery, push/pull balance)"+NL+"2. For each category: the specific exercise, target sets x reps/seconds, and modifier recommendation"+NL+"3. Suggested rest times between sets"+NL+"4. One technique cue for any exercise where I am close to advancing"+NL+"5. Overall session RPE target"+NL+NL+"Be specific. Reference my actual exercises and numbers.",
      weekly: "Today is "+today+". Review my training week and give me a coaching analysis."+NL+NL+"My training context:"+NL+ctxJson+NL+NL+"Please provide:"+NL+"1. Volume and frequency assessment vs OG recommendations"+NL+"2. Progress highlights - what is trending up"+NL+"3. Lagging areas that need attention"+NL+"4. Push/pull structural balance assessment (OG says imbalances cause shoulder injuries)"+NL+"5. Top 3 specific adjustments for next week"+NL+"6. Body comp context if available",
      plateau: "I want advice on breaking through plateaus in my training."+NL+NL+"My training context:"+NL+ctxJson+NL+NL+"Please:"+NL+"1. Identify which exercises have stalled (low readiness, same numbers over time)"+NL+"2. For each stalled exercise, give 2-3 OG-based strategies (rep scheme changes, eccentrics, iso work, deload)"+NL+"3. Check if overall volume is too high or too low"+NL+"4. Suggest periodization adjustments based on my level"+NL+"5. Flag structural imbalances that might be limiting progress",
      balance: "Analyze my push/pull structural balance."+NL+NL+"My training context:"+NL+ctxJson+NL+NL+"Please:"+NL+"1. Assess my push/pull set ratio (OG recommends 1:1, with extra horizontal pulling for shoulder health)"+NL+"2. Check if I am training OG-recommended prehab movements (back lever for shoulder ext, L-sit for core)"+NL+"3. Identify dangerous imbalances (OG author injured his shoulder from too much push)"+NL+"4. Give specific prescription to correct any imbalances"+NL+"5. Flag exercises to prioritize or deprioritize based on my current levels"
    };

    var sysPrompt = "You are an expert bodyweight strength coach with deep knowledge of Steven Low's Overcoming Gravity 2nd Edition methodology. You have access to the athlete's real training data. Key OG principles to apply: SAID principle, structural balance (push:pull ratio critical for shoulder health), linear progression from beginner through advanced, isometric holds use 1 rep = 2s formula at 60-75% max hold time, eccentrics are tools for progressions not yet achieved concentrically, full-body routines recommended for beginners/intermediate. SESSION STRUCTURE (sequence matters): (1) MOBILITY/FLEXIBILITY goes in the warm-up as active mobility (prep, not fatigue) and should also be trained daily outside sessions per 'use it or lose it'; static/loaded stretching belongs at the end when warm and fatigued. (2) PLYOMETRIC/POWER work goes early while the CNS is fresh: low-rep, full 3-min rest, NOT to failure — quality over quantity. (3) STRENGTH work is the core. (4) CONTROL/TEMPO work (fine motor control, intra-set holds, partial-range tension) is fatiguing skill-strength done in the strength block or as cool-down. The athlete's goal is aesthetics, mastery of OG movements, and a Baki/Yujiro-style profile: fine muscular control, active flexibility with end-range strength, explosive power, and low body fat — not size for its own sake. Be direct, specific, and reference their actual numbers and exercises. No generic advice.";

    callClaude(prompts[coachState.mode], sysPrompt, function(err, text){
      coachState.loading=false;
      if(err){coachState.error=err;}else{coachState.response=text;}
      render();
    });
  });
  wrap.appendChild(genBtn);

  // Error
  if(coachState.error){
    wrap.appendChild(tw("Error: "+coachState.error,{color:Cr,fontSize:"12px",padding:"8px 0"}));
  }

  // Response
  if(coachState.response){
    var respCard = card({background:Cy,borderLeft:"3px solid "+Ci});
    respCard.appendChild(mk("div",{fontFamily:FH,fontSize:"13px",color:Ci,marginBottom:"10px",borderBottom:"1px solid "+Cl,paddingBottom:"6px"},"Coach Analysis"));
    // Render response with basic paragraph formatting
    var paras = coachState.response.split("\n");
    for(var pi=0;pi<paras.length;pi++){
      var para = paras[pi].trim();
      if(!para)continue;
      var isHeader = para.match(/^[0-9]+[.]/) || para.match(/^[#]+/) || (para.length<60 && para[para.length-1]===":");
      var pEl = mk("div",{fontFamily:isHeader?FH:FB,fontSize:isHeader?"13px":"12px",color:isHeader?Ci:Cm,marginBottom:isHeader?"6px":"3px",fontWeight:isHeader?"bold":"normal",lineHeight:"1.6"},para.replace(/^[#]+ */,"").replace(/[*][*]/g,""));
      respCard.appendChild(pEl);
    }
    wrap.appendChild(respCard);

    // Quick-apply WOD button (only for WOD mode)
    if(coachState.mode==="wod"){
      var applyNote = card({background:"#e8f0e8",borderLeft:"3px solid "+Cg});
      applyNote.appendChild(tw("Review the AI suggestion above, then head to the TODAY tab to log your session. Your current progressions are already set — the coach suggestion is a guide, not an override.",{color:Cg,fontSize:"11px"}));
      wrap.appendChild(applyNote);
    }
  }

  // No data warning
  if(ctx.totalSessions<3){
    var noData = card({borderLeft:"3px solid "+Cm});
    noData.appendChild(tw("Log at least 3 sessions first for the AI to have meaningful data to analyze. The more you log, the more specific the coaching.",{color:Cm,fontSize:"11px",fontStyle:"italic"}));
    wrap.appendChild(noData);
  }

  return wrap;
}


function renderSettings(){
  var wrap=dv({display:"flex",flexDirection:"column",gap:"10px"});var s=D.settings;
  var sc=card();sc.appendChild(lbl("Workout Split"));sc.appendChild(tw("OG recommends full-body for beginners. Splits work when volume stays moderate.",{color:Cm,marginBottom:"8px",fontSize:"11px",fontStyle:"italic"}));
  var sk=Object.keys(SPLITS);
  for(var si=0;si<sk.length;si++){
    (function(key){var sp=SPLITS[key];var active=s.split===key;
      var row=dv({display:"flex",alignItems:"flex-start",gap:"8px",padding:"8px",marginBottom:"4px",background:active?"#e8e0d0":"transparent",border:"1px solid "+(active?Ci:Cl),borderRadius:"2px",cursor:"pointer"});
      row.appendChild(mk("div",{width:"12px",height:"12px",borderRadius:"50%",border:"2px solid "+(active?Ci:Cm),background:active?Ci:"transparent",marginTop:"2px",flexShrink:"0"}));
      var info=dv({});info.appendChild(mk("div",{fontFamily:FH,fontSize:"13px",color:active?Ci:Cm},sp.name));info.appendChild(tw(sp.desc,{color:Cm,fontSize:"10px"}));row.appendChild(info);
      row.addEventListener("click",function(){D.settings.split=key;saveData(D);render();});sc.appendChild(row);
    })(sk[si]);
  }
  wrap.appendChild(sc);
  var setC=card();setC.appendChild(lbl("Sets Per Exercise"));setC.appendChild(tw("Research: 2-3 sets optimal for high-frequency training.",{color:Cm,marginBottom:"8px",fontSize:"11px",fontStyle:"italic"}));
  var sr=dv({display:"flex",gap:"6px"});
  for(var ni=1;ni<=5;ni++){
    (function(n){var active=parseInt(s.sets||3)===n;
      var b=mk("button",{flex:"1",padding:"8px 0",textAlign:"center",fontFamily:FH,fontSize:"16px",color:active?Cs:Ci,background:active?Ci:"transparent",border:"1px solid "+(active?Ci:Cm),borderRadius:"2px",cursor:"pointer"},String(n));
      b.addEventListener("click",function(){D.settings.sets=n;saveData(D);render();});sr.appendChild(b);
    })(ni);
  }
  setC.appendChild(sr);wrap.appendChild(setC);
  var repC=card();repC.appendChild(lbl("Rep Scheme"));
  var reps=[{id:"failure",name:"To Failure",note:"OG standard. Maximum reps each set."},{id:"rpe",name:"RPE 8-9 (RIR 1-2)",note:"Leave 1-2 reps in reserve. Best for high-frequency."},{id:"fixed",name:"Fixed Target",note:"Exact OG level target reps."}];
  for(var ri=0;ri<reps.length;ri++){
    (function(rs){var active=s.repScheme===rs.id;
      var row=dv({display:"flex",gap:"8px",alignItems:"flex-start",padding:"8px",marginBottom:"4px",background:active?"#e8e0d0":"transparent",border:"1px solid "+(active?Ci:Cl),borderRadius:"2px",cursor:"pointer"});
      row.appendChild(mk("div",{width:"12px",height:"12px",borderRadius:"50%",border:"2px solid "+(active?Ci:Cm),background:active?Ci:"transparent",marginTop:"2px",flexShrink:"0"}));
      var info=dv({});info.appendChild(mk("div",{fontFamily:FH,fontSize:"12px",color:active?Ci:Cm},rs.name));info.appendChild(tw(rs.note,{color:Cm,fontSize:"10px",fontStyle:"italic"}));row.appendChild(info);
      row.addEventListener("click",function(){D.settings.repScheme=rs.id;saveData(D);render();});repC.appendChild(row);
    })(reps[ri]);
  }
  wrap.appendChild(repC);
  var pc=card();pc.appendChild(lbl("Current Progressions"));pc.appendChild(mk("hr",{border:"none",borderTop:"1px solid "+Cm,margin:"6px 0"}));
  var ok=Object.keys(OG);
  for(var oi=0;oi<ok.length;oi++){
    (function(k){var c=OG[k];var curr=D.progressions[k];var ex=curr?findEx(k,curr):null;
      var row=dv({display:"flex",alignItems:"center",gap:"7px",padding:"4px 0",borderBottom:"1px dashed "+Cl});
      row.appendChild(mk("span",{color:c.color,fontSize:"11px",minWidth:"14px"},c.icon));
      row.appendChild(tw(c.label,{color:Cm,minWidth:"120px",fontSize:"10px"}));
      row.appendChild(mk("span",{flex:"1",fontFamily:FH,fontSize:"12px",color:ex?Ci:Cm,fontStyle:ex?"normal":"italic"},ex?ex.name:"not set"));
      if(ex)row.appendChild(stamp("L"+ex.level,Cm));pc.appendChild(row);
    })(ok[oi]);
  }
  wrap.appendChild(pc);return wrap;
}

render();
</script>
