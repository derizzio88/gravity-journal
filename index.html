var KEY="gravity_og_v4";
function loadData(){
  try{
    var r=localStorage.getItem(KEY);
    if(r){var d=JSON.parse(r);if(!d.settings)d.settings={};if(!d.sessions)d.sessions=[];if(!d.progressions)d.progressions={};if(!d.settings.split)d.settings.split="fullbody";if(!d.settings.sets)d.settings.sets=3;if(!d.settings.repScheme)d.settings.repScheme="failure";return d;}
  }catch(e){}
  return{sessions:[],progressions:{},settings:{split:"fullbody",sets:3,repScheme:"failure"}};
}
function saveData(d){try{localStorage.setItem(KEY,JSON.stringify(d));}catch(e){}}

// ── MIGRATION: always carry forward data even if KEY changes ──────────────────
var LEGACY_KEYS=["gravity_og_v1","gravity_og_v2","gravity_og_v3"];
(function migrate(){
  if(localStorage.getItem(KEY))return; // already have current data
  for(var i=0;i<LEGACY_KEYS.length;i++){
    var old=localStorage.getItem(LEGACY_KEYS[i]);
    if(old){try{var d=JSON.parse(old);localStorage.setItem(KEY,old);console.log("Migrated from "+LEGACY_KEYS[i]);}catch(e){}return;}
  }
})();

// ── EXPORT: download data as JSON file ────────────────────────────────────────
function exportData(){
  var d=loadData();
  var json=JSON.stringify(d,null,2);
  var blob=new Blob([json],{type:"application/json"});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a");
  a.href=url;
  a.download="gravity-journal-backup-"+new Date().toISOString().split("T")[0]+".json";
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ── IMPORT: restore from JSON backup file ────────────────────────────────────
function importData(file,callback){
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var d=JSON.parse(e.target.result);
      // Validate structure
      if(!d.sessions||!Array.isArray(d.sessions)){callback("Invalid backup file - missing sessions.");return;}
      // Merge: keep newer sessions, don't overwrite
      var existing=loadData();
      var existingIds={};
      for(var i=0;i<existing.sessions.length;i++)existingIds[existing.sessions[i].id]=true;
      var newSessions=d.sessions.filter(function(s){return!existingIds[s.id];});
      var merged={
        sessions:existing.sessions.concat(newSessions).sort(function(a,b){return a.date>b.date?1:-1;}),
        progressions:Object.assign({},d.progressions||{},existing.progressions),
        bodyComp:existing.bodyComp||d.bodyComp||[],
        settings:existing.settings||d.settings||{}
      };
      saveData(merged);
      callback(null,newSessions.length+" new sessions merged, "+existing.sessions.length+" existing kept.");
    }catch(err){callback("Could not parse backup file: "+err.message);}
  };
  reader.readAsText(file);
}

// ── AUTO-BACKUP REMINDER: flag if no backup in 7 days ────────────────────────
function checkBackupReminder(){
  var last=localStorage.getItem("gravity_last_backup");
  if(!last)return true;
  return (Date.now()-parseInt(last))>7*86400000;
}
function markBackedUp(){localStorage.setItem("gravity_last_backup",String(Date.now()));}

function startRest(secs,catKey){
  if(restTimer)clearInterval(restTimer);
  restStart=Date.now();restDuration=0;restTarget=secs;restForCat=catKey;
  restTimer=setInterval(function(){
    restDuration=Math.round((Date.now()-restStart)/1000);
    var el=document.getElementById("rest_"+catKey);
    if(el){
      var rem=Math.max(0,restTarget-restDuration);
      el.textContent=rem>0?"Rest: "+rem+"s":"Ready!";
      el.style.color=rem>0?Cm:Cg;
    }
    if(restDuration>=restTarget){
      clearInterval(restTimer);restTimer=null;
      try{var a=new Audio("data:audio/wav;base64,UklGRl9vT19XQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YU"+Array(100).join("A"));a.play();}catch(e){}
    }
  },500);
}

function getTh(catKey,exId){
  var cat=OG[catKey];if(!cat)return{val:10,type:"con"};
  var ex=null;for(var i=0;i<cat.progressions.length;i++)if(cat.progressions[i].id===exId){ex=cat.progressions[i];break;}
  if(!ex)return{val:10,type:"con"};
  var idx=typeof ex.level==="number"?Math.min(Math.max(0,ex.level-1),cat.rt.length-1):2;
  var repVal=cat.rt[idx]||8;
  // OG: 1 rep = ~2s iso hold. Working set = 60-75% of max, use 65% midpoint.
  var val=ex.type==="iso"?Math.round(repVal*2*0.65):repVal;
  return{val:val,type:ex.type};
}
function calcR(sessions,catKey,exId){
  var th=getTh(catKey,exId),sets=[],recent=sessions.slice(-21);
  for(var i=0;i<recent.length;i++)for(var j=0;j<recent[i].sets.length;j++){var b=recent[i].sets[j];if(b.category===catKey&&b.exerciseId===exId&&b.modifier==="std")sets.push(b);}
  if(sets.length<2)return{ready:false,pct:0,avg:0,target:th.val,type:th.type};
  var total=0;for(var k=0;k<sets.length;k++)total+=(th.type==="iso"?(sets[k].seconds||0):(sets[k].reps||0));
  var avg=total/sets.length,pct=Math.min(100,Math.round(avg/th.val*100));
  return{ready:avg>=th.val,pct:pct,avg:Math.round(avg*10)/10,target:th.val,type:th.type};
}

}

function renderData(){
  var wrap=dv({display:"flex",flexDirection:"column",gap:"10px"});
  var d=loadData();
  var needsBackup=checkBackupReminder();

  // Status card
  var statCard=card(needsBackup?{borderLeft:"3px solid "+Cr}:{borderLeft:"3px solid "+Cg});
  statCard.appendChild(mk("div",{fontFamily:FH,fontSize:"15px",color:needsBackup?Cr:Cg,marginBottom:"6px"},needsBackup?"Backup recommended":"Data is protected"));
  var stats=[
    "Sessions: "+d.sessions.length,
    "Total sets: "+d.sessions.reduce(function(n,s){return n+s.sets.length;},0),
    "Progressions set: "+Object.keys(d.progressions||{}).filter(function(k){return d.progressions[k];}).length,
    "Storage key: "+KEY
  ];
  for(var i=0;i<stats.length;i++)statCard.appendChild(tw(stats[i],{color:Cm,fontSize:"11px",marginBottom:"2px"}));
  wrap.appendChild(statCard);

function renderHistory(){

  var thisWeek=0;var weekAgo=Date.now()-7*86400000;
  for(var i=0;i<D.sessions.length;i++)if(new Date(D.sessions[i].date).getTime()>=weekAgo)thisWeek++;

      var key=b.category+"|"+b.exerciseId;

  }

  wrap.appendChild(mk("div",{fontFamily:FH,fontSize:"13px",color:Ci,borderBottom:"1px solid "+Cm,paddingBottom:"6px",marginBottom:"4px"},"Exercise Trends"));

  for(var ei=0;ei<exKeys.length;ei++){

      var d=exData[key];var ex=findEx(d.catKey,d.exId);if(!ex)return;
      var cat=OG[d.catKey];if(!cat)return;
      var th=getTh(d.catKey,d.exId);
      var entries=d.entries;var last5=entries.slice(-5);
      var latestVal=last5[last5.length-1].val;
      var prevVal=last5.length>1?last5[last5.length-2].val:null;
      var trend=prevVal!==null?(latestVal>prevVal?"up":latestVal<prevVal?"down":"flat"):"new";
      var trendIcon=trend==="up"?"+":trend==="down"?"-":"=";
      var trendColor=trend==="up"?Cg:trend==="down"?Cr:Cm;

      var c=card({});
      var hrow=dv({display:"flex",alignItems:"center",gap:"8px",marginBottom:"8px"});
      hrow.appendChild(mk("span",{color:cat.color,fontSize:"11px"},cat.icon));
      hrow.appendChild(mk("span",{flex:"1",fontFamily:FH,fontSize:"13px",color:Ci},ex.name));
      hrow.appendChild(mk("span",{fontFamily:FH,fontSize:"16px",color:trendColor,fontWeight:"bold"},trendIcon));
      hrow.appendChild(mk("span",{fontFamily:FH,fontSize:"16px",color:Ci},latestVal+(ex.type==="iso"?"s":"")));

      // Sparkline-style bar chart using divs

      var maxVal=0;for(var i=0;i<last5.length;i++)if(last5[i].val>maxVal)maxVal=last5[i].val;
      if(maxVal===0)maxVal=1;
      for(var i=0;i<last5.length;i++){
        var barH=Math.max(4,Math.round((last5[i].val/maxVal)*36));
        var isLatest=i===last5.length-1;

        var barWrap=dv({flex:"1",display:"flex",flexDirection:"column",alignItems:"center",gap:"2px"});

        barWrap.appendChild(mk("span",{fontSize:"8px",color:Cm,fontFamily:FB},last5[i].val+(ex.type==="iso"?"s":"")));

      c.appendChild(tw("Target: "+th.val+(ex.type==="iso"?"s":" reps")+" | "+entries.length+" sets logged",{color:Cm,fontSize:"10px",marginTop:"3px"}));
      wrap.appendChild(c);

  }

  wrap.appendChild(mk("div",{fontFamily:FH,fontSize:"13px",color:Ci,borderBottom:"1px solid "+Cm,paddingBottom:"6px",marginBottom:"4px",marginTop:"8px"},"Recent Sessions"));

      sHdr.appendChild(mk("span",{fontFamily:FH,fontSize:"12px",color:Ci},sess.date));
      sHdr.appendChild(mk("span",{fontFamily:FB,fontSize:"10px",color:Cm},sess.sets.length+" sets"));
      sc.appendChild(sHdr);
      for(var si=0;si<sess.sets.length;si++){
        var b=sess.sets[si];var ex=findEx(b.category,b.exerciseId);var cat=OG[b.category];
        var mObj=null;for(var mi=0;mi<MODS.length;mi++)if(MODS[mi].id===b.modifier){mObj=MODS[mi];break;}
        var row=dv({display:"flex",alignItems:"center",gap:"7px",padding:"3px 0",borderBottom:si<sess.sets.length-1?"1px dashed "+Cl:"none"});
        if(cat)row.appendChild(mk("span",{fontSize:"9px",color:cat.color},cat.icon));
        row.appendChild(mk("span",{flex:"1",fontSize:"11px",fontFamily:FB},ex?ex.name:b.exerciseId));

        row.appendChild(mk("span",{fontSize:"12px",fontFamily:FH,color:Ci},b.seconds?b.seconds+"s":b.reps?String(b.reps):"-"));
        sc.appendChild(row);
      }
      wrap.appendChild(sc);

  }
  return wrap;

        restDiv.textContent=remT>0?"Rest: "+remT+"s":"Ready!";
        restDiv.style.color=remT>0?Cm:Cg;
        restDiv.style.fontFamily=FH;restDiv.style.fontSize="13px";
      }
      c.appendChild(restDiv);

      // Modifier row on WOD card
      var wodMod=D._wodMod||{};var curMod=wodMod[catKey]||"std";
      var modRow=dv({display:"flex",gap:"4px",flexWrap:"wrap",marginBottom:"8px"});
      for(var mwi=0;mwi<MODS.length;mwi++){
        (function(m){var mActive=curMod===m.id;
          var mb=mk("button",{fontFamily:FB,fontSize:"9px",color:mActive?Cs:Cm,background:mActive?Cm:"transparent",border:"1px solid "+Cl,padding:"2px 7px",borderRadius:"2px",cursor:"pointer"},m.s);
          mb.addEventListener("click",function(){if(!D._wodMod)D._wodMod={};D._wodMod[catKey]=m.id;render();});
          modRow.appendChild(mb);
        })(MODS[mwi]);
      }
      c.appendChild(modRow);
      // Actual value input
      var wodVals=D._wodVals||{};var curVal=wodVals[catKey]||"";
      var valRow=dv({display:"flex",gap:"8px",alignItems:"flex-end",marginBottom:"8px"});
      var vf=dv({flex:"1"});vf.appendChild(lbl(isIso?"Seconds held":"Reps achieved"));
      var vinput=document.createElement("input");vinput.type="number";vinput.min="1";
      vinput.placeholder=isIso?(curMod==="iso"?th.val+"s target":th.val+" reps"):th.val+" reps";
      vinput.value=curVal;vinput.style.fontSize="16px";vinput.style.fontFamily=FH;
      vinput.addEventListener("input",function(e){if(!D._wodVals)D._wodVals={};D._wodVals[catKey]=e.target.value;});
      vf.appendChild(vinput);valRow.appendChild(vf);
      var nf=dv({flex:"1"});nf.appendChild(lbl("Notes"));
      var ninput=document.createElement("input");ninput.type="text";ninput.placeholder="form, feel...";ninput.value=(D._wodNotes&&D._wodNotes[catKey])||"";
      ninput.addEventListener("input",function(e){if(!D._wodNotes)D._wodNotes={};D._wodNotes[catKey]=e.target.value;});
      nf.appendChild(ninput);valRow.appendChild(nf);
      c.appendChild(valRow);
      var brow=dv({display:"flex",gap:"8px"});
      if(allDone){brow.appendChild(tw("- complete -",{color:"#2a7a2a",fontStyle:"italic",padding:"8px 0",flex:"1",textAlign:"center"}));}
      else{
        var logMod=curMod||"std";var isIsoFinal=isIso||(logMod==="iso");
        brow.appendChild(iBtn("[ LOG SET ]",function(){
          var enteredVal=D._wodVals&&D._wodVals[catKey]?parseInt(D._wodVals[catKey]):null;
          var logVal=enteredVal||th.val;
          var shortfall=(!isIsoFinal&&enteredVal&&enteredVal<th.val)?(th.val-enteredVal):0;
          completed[catKey]=(completed[catKey]||0)+1;
          logSets.push({id:Date.now()+Math.random(),category:catKey,exerciseId:currId,modifier:logMod,reps:!isIsoFinal?logVal:null,seconds:isIsoFinal?logVal:null,notes:(D._wodNotes&&D._wodNotes[catKey])||"WOD",ts:Date.now()});
          // If shortfall, auto-log eccentric sets to make up the difference
          if(shortfall>0){
            logSets.push({id:Date.now()+Math.random()+0.1,category:catKey,exerciseId:currId,modifier:"ecc",reps:shortfall,seconds:null,notes:"Eccentric top-up ("+logVal+"+"+shortfall+"ecc="+th.val+")",ts:Date.now()});
          }
          if(!D._wodVals)D._wodVals={};D._wodVals[catKey]="";
          // Start rest timer
          var restSecs=isIsoFinal?90:(logVal>=12?90:120);
          startRest(restSecs,catKey);
          render();
        },{primary:true,style:{flex:"1"}}));
      }
      if(doneCount>0)brow.appendChild(iBtn("Undo",function(){completed[catKey]=Math.max(0,(completed[catKey]||0)-1);logSets.pop();render();},{small:true}));
      c.appendChild(brow);wrap.appendChild(c);
    })(cats[ei]);
  }

  var totalDone=0;var keys=Object.keys(completed);for(var ki=0;ki<keys.length;ki++)totalDone+=completed[keys[ki]];
  var kbDone=0;for(var li=0;li<logSets.length;li++)if(logSets[li].category==="kettlebell")kbDone++;
  if(totalDone>0||kbDone>0){
    var fin=card({borderLeft:"3px solid "+Ci,background:Cy});
    var allComplete=true;for(var fi=0;fi<cats.length;fi++)if(D.progressions[cats[fi]]&&(completed[cats[fi]]||0)<targetSets){allComplete=false;break;}
    fin.appendChild(hw(allComplete?"Session Complete":"Save Progress",{marginBottom:"6px"}));
    fin.appendChild(tw((totalDone+kbDone)+" sets logged"+(kbDone?" (incl. "+kbDone+" KB)":""),{color:Cm,marginBottom:"10px"}));
    fin.appendChild(iBtn(allComplete?"[ SIGN & SAVE SESSION ]":"[ SAVE PARTIAL SESSION ]",function(){
      if(!logSets.length)return;
      D.sessions.push({id:Date.now(),date:new Date().toISOString().split("T")[0],sets:logSets.slice()});
      saveData(D);logSets=[];completed={};wodDayIdx=null;render();
    },{primary:true,full:true,head:true}));
    wrap.appendChild(fin);
  }
  return wrap;
}

function renderLog(){
  var wrap=dv({display:"flex",flexDirection:"column",gap:"10px"});
  var cc=card();cc.appendChild(lbl("Category"));
  var cr=dv({display:"flex",gap:"4px",flexWrap:"wrap",marginTop:"4px"});
  var catKeys=Object.keys(OG);
  for(var i=0;i<catKeys.length;i++){
    (function(k){var c=OG[k];var active=progCat===k;
      var b=mk("button",{fontFamily:FB,fontSize:"10px",color:active?Cs:Ci,background:active?Ci:"transparent",border:"1px solid "+(active?Ci:Cm),padding:"3px 7px",borderRadius:"2px",cursor:"pointer"},c.icon+" "+c.label);
      b.addEventListener("click",function(){progCat=k;render();});cr.appendChild(b);
    })(catKeys[i]);
  }
  cc.appendChild(cr);wrap.appendChild(cc);
  var catData=OG[progCat];var ec=card();ec.appendChild(lbl("Exercise - "+catData.label));
  var el2=dv({display:"flex",flexDirection:"column",gap:"2px",maxHeight:"200px",overflowY:"auto",marginTop:"4px"});
  for(var i=0;i<catData.progressions.length;i++){
    (function(ex){var sel=D._logExId===ex.id;var r=calcR(D.sessions,progCat,ex.id);
      var row=dv({display:"flex",alignItems:"center",gap:"7px",padding:"6px 8px",background:sel?"#e8e0d0":"transparent",borderLeft:"2px solid "+(sel?Ci:"transparent"),cursor:"pointer"});
      row.appendChild(mk("span",{fontSize:"9px",color:Cm,minWidth:"18px",fontFamily:FB},"L"+(ex.level||"?")));
      row.appendChild(mk("span",{flex:"1",fontSize:"12px",fontFamily:FB,color:ex.p?Cr:Ci},ex.name+(ex.p?" *":"")));
      row.appendChild(mk("span",{fontSize:"8px",color:ex.type==="iso"?Cb:Cr,fontFamily:FB},ex.type==="iso"?"ISO":"DYN"));
      if(r.ready)row.appendChild(stamp("advance",Cg));
      row.addEventListener("click",function(){D._logExId=ex.id;D._logMod="std";render();});el2.appendChild(row);
    })(catData.progressions[i]);
  }
  ec.appendChild(el2);wrap.appendChild(ec);
  if(D._logExId){
    var exObj=findEx(progCat,D._logExId);var isIso=(exObj&&exObj.type==="iso")||D._logMod==="iso";var th=getTh(progCat,D._logExId);
    var ic=card();ic.appendChild(lbl("Modifier"));
    var mr=dv({display:"flex",gap:"4px",flexWrap:"wrap",marginBottom:"10px",marginTop:"4px"});
    for(var mi=0;mi<MODS.length;mi++){
      (function(m){var active=(D._logMod||"std")===m.id;
        var b=mk("button",{fontFamily:FB,fontSize:"10px",color:active?Cs:Cm,background:active?Cm:"transparent",border:"1px solid "+Cm,padding:"3px 7px",borderRadius:"2px",cursor:"pointer"},m.s);
        b.addEventListener("click",function(){D._logMod=m.id;render();});mr.appendChild(b);
      })(MODS[mi]);
    }
    ic.appendChild(mr);
    var ir=dv({display:"flex",gap:"10px",alignItems:"flex-end"});
    var f1=dv({flex:"1"});f1.appendChild(lbl(isIso?"Seconds":"Reps"));
    var vi=document.createElement("input");vi.type="number";vi.min="1";vi.placeholder=th.val+(isIso?"s":" reps");vi.value=D._logVal||"";vi.style.fontSize="16px";vi.style.fontFamily=FH;
    vi.addEventListener("input",function(e){D._logVal=e.target.value;});f1.appendChild(vi);ir.appendChild(f1);
    var f2=dv({flex:"1"});f2.appendChild(lbl("Notes"));
    var ni=document.createElement("input");ni.type="text";ni.placeholder="form cues...";ni.value=D._logNotes||"";
    ni.addEventListener("input",function(e){D._logNotes=e.target.value;});f2.appendChild(ni);ir.appendChild(f2);
    ir.appendChild(iBtn("[ + ]",function(){
      var mod=D._logMod||"std";var isoF=(exObj&&exObj.type==="iso")||mod==="iso";
      logSets.push({id:Date.now(),category:progCat,exerciseId:D._logExId,modifier:mod,reps:!isoF?(parseInt(D._logVal)||null):null,seconds:isoF?(parseInt(D._logVal)||null):null,notes:D._logNotes||"",ts:Date.now()});
      D._logVal="";D._logNotes="";render();
    },{primary:true,small:true,style:{marginBottom:"2px"}}));
    ic.appendChild(ir);wrap.appendChild(ic);
  }
  if(logSets.length){
    var sc=card({background:Cy});sc.appendChild(lbl("Session - "+logSets.length+" sets"));
    for(var li=0;li<logSets.length;li++){
      (function(s,i){
        var ex=findEx(s.category,s.exerciseId);var name=ex?ex.name:s.exerciseId;
        var m=null;for(var mi=0;mi<MODS.length;mi++)if(MODS[mi].id===s.modifier){m=MODS[mi];break;}
        var row=dv({display:"flex",alignItems:"center",gap:"7px",padding:"5px 0",borderBottom:"1px dashed "+Cm});
        row.appendChild(mk("span",{fontSize:"10px",color:Cm,fontFamily:FB},(i+1)+"."));
        row.appendChild(mk("span",{flex:"1",fontSize:"12px",fontFamily:FB},name));
        row.appendChild(stamp(m?m.s:"std",Cm));
        row.appendChild(mk("span",{fontSize:"14px",fontFamily:FH,color:Ci},s.seconds?s.seconds+"s":s.reps?String(s.reps):"-"));
        var xb=mk("button",{color:Cr,background:"none",border:"none",cursor:"pointer",fontSize:"14px"},"x");
        xb.addEventListener("click",(function(idx){return function(){logSets.splice(idx,1);render();};})(i));
        row.appendChild(xb);sc.appendChild(row);
      })(logSets[li],li);
    }
    sc.appendChild(iBtn("[ SAVE SESSION ]",function(){
      D.sessions.push({id:Date.now(),date:new Date().toISOString().split("T")[0],sets:logSets.slice()});
      saveData(D);logSets=[];render();
    },{primary:true,full:true,head:true,style:{marginTop:"10px"}}));
    wrap.appendChild(sc);
  }
  return wrap;
}

function renderProgress(){
  var wrap=dv({display:"flex",flexDirection:"column",gap:"8px"});
  var cr=dv({display:"flex",gap:"4px",flexWrap:"wrap",marginBottom:"6px"});
  var catKeys=Object.keys(OG);
  for(var ci=0;ci<catKeys.length;ci++){
    (function(k){var c=OG[k];var active=setsCat===k;
      var b=mk("button",{fontFamily:FB,fontSize:"10px",color:active?Cs:Ci,background:active?Ci:"transparent",border:"1px solid "+(active?Ci:Cm),padding:"3px 7px",borderRadius:"2px",cursor:"pointer"},c.icon+" "+c.label);
      b.addEventListener("click",function(){setsCat=k;render();});cr.appendChild(b);
    })(catKeys[ci]);
  }
  wrap.appendChild(cr);
  var catData=OG[setsCat];
  if(catData.kb){
    var ki=card({borderLeft:"3px solid "+Cm});ki.appendChild(lbl("Kettlebell Library"));ki.appendChild(tw(catData.desc,{color:Cm,marginBottom:"6px"}));ki.appendChild(hw("Add KB circuits from the Today tab, or log individually.",{fontSize:"12px",color:Cm}));wrap.appendChild(ki);
  }
  for(var pi=0;pi<catData.progressions.length;pi++){
    (function(ex){
      var allSets=[];for(var i=0;i<D.sessions.length;i++)for(var j=0;j<D.sessions[i].sets.length;j++){var b=D.sessions[i].sets[j];if(b.category===setsCat&&b.exerciseId===ex.id)allSets.push(b);}
      var stdSets=[];for(var i=0;i<allSets.length;i++)if(allSets[i].modifier==="std")stdSets.push(allSets[i]);
      var best=null;for(var i=0;i<stdSets.length;i++){var v=stdSets[i].seconds||stdSets[i].reps||0;if(!best||(v>(best.seconds||best.reps||0)))best=stdSets[i];}
      var r=calcR(D.sessions,setsCat,ex.id);var isCurr=D.progressions[setsCat]===ex.id;var th=getTh(setsCat,ex.id);
      var c=card({borderLeft:"3px solid "+(isCurr?catData.color:r.ready?"#2a7a2a":Cl)});
      var trow=dv({display:"flex",alignItems:"center",gap:"6px",marginBottom:allSets.length?"7px":"0",flexWrap:"wrap"});
      trow.appendChild(mk("span",{fontSize:"9px",color:Cm,minWidth:"20px",fontFamily:FB},"L"+(ex.level||"?")));
      trow.appendChild(mk("span",{flex:"1",fontFamily:FH,fontSize:"13px",color:ex.p?Cr:Ci,fontWeight:isCurr?"bold":"normal"},ex.name+(ex.p?" *":"")));
      trow.appendChild(mk("span",{fontSize:"8px",color:ex.type==="iso"?Cb:Cr,fontFamily:FB},ex.type==="iso"?"ISO":"DYN"));
      if(isCurr)trow.appendChild(stamp("current",catData.color));
      if(r.ready)trow.appendChild(stamp("advance",Cg));
      var setB=mk("button",{fontFamily:FB,fontSize:"9px",color:Cb,background:"none",border:"1px solid "+Cb,padding:"1px 5px",borderRadius:"2px",cursor:"pointer"},"[ SET ]");
      setB.addEventListener("click",(function(exId){return function(){D.progressions[setsCat]=exId;saveData(D);render();};})(ex.id));
      trow.appendChild(setB);c.appendChild(trow);
      if(allSets.length){
        c.appendChild(ibar(r.pct,r.ready?"#2a7a2a":catData.color));
        var stats=dv({display:"flex",gap:"14px",marginTop:"6px",flexWrap:"wrap"});
        var sd=[{l:"Total",v:allSets.length},{l:"Best",v:best?(best.seconds?best.seconds+"s":String(best.reps)):"-"},{l:"Target",v:th.type==="iso"?th.val+"s":th.val+" reps"}];
        for(var si=0;si<sd.length;si++){var d=dv({});d.appendChild(lbl(sd[si].l));d.appendChild(tw(String(sd[si].v),{fontSize:"12px",fontFamily:FH}));stats.appendChild(d);}
        c.appendChild(stats);
      }else{c.appendChild(tw("No sets yet - target: "+(th.type==="iso"?th.val+"s":th.val+" reps"),{color:Cm,fontSize:"10px",fontStyle:"italic",marginTop:"3px"}));}
      wrap.appendChild(c);
    })(catData.progressions[pi]);
  }
  return wrap;
}

function renderSettings(){
  var wrap=dv({display:"flex",flexDirection:"column",gap:"10px"});var s=D.settings;
  var sc=card();sc.appendChild(lbl("Workout Split"));sc.appendChild(tw("OG recommends full-body for beginners. Splits work when volume stays moderate.",{color:Cm,marginBottom:"8px",fontSize:"11px",fontStyle:"italic"}));
  var sk=Object.keys(SPLITS);
  for(var si=0;si<sk.length;si++){
    (function(key){var sp=SPLITS[key];var active=s.split===key;
      var row=dv({display:"flex",alignItems:"flex-start",gap:"8px",padding:"8px",marginBottom:"4px",background:active?"#e8e0d0":"transparent",border:"1px solid "+(active?Ci:Cl),borderRadius:"2px",cursor:"pointer"});
      row.appendChild(mk("div",{width:"12px",height:"12px",borderRadius:"50%",border:"2px solid "+(active?Ci:Cm),background:active?Ci:"transparent",marginTop:"2px",flexShrink:"0"}));
      var info=dv({});info.appendChild(mk("div",{fontFamily:FH,fontSize:"13px",color:active?Ci:Cm},sp.name));info.appendChild(tw(sp.desc,{color:Cm,fontSize:"10px"}));row.appendChild(info);
      row.addEventListener("click",function(){D.settings.split=key;saveData(D);render();});sc.appendChild(row);
    })(sk[si]);
  }
  wrap.appendChild(sc);
  var setC=card();setC.appendChild(lbl("Sets Per Exercise"));setC.appendChild(tw("Research: 2-3 sets optimal for high-frequency training.",{color:Cm,marginBottom:"8px",fontSize:"11px",fontStyle:"italic"}));
  var sr=dv({display:"flex",gap:"6px"});
  for(var ni=1;ni<=5;ni++){
    (function(n){var active=parseInt(s.sets||3)===n;
      var b=mk("button",{flex:"1",padding:"8px 0",textAlign:"center",fontFamily:FH,fontSize:"16px",color:active?Cs:Ci,background:active?Ci:"transparent",border:"1px solid "+(active?Ci:Cm),borderRadius:"2px",cursor:"pointer"},String(n));
      b.addEventListener("click",function(){D.settings.sets=n;saveData(D);render();});sr.appendChild(b);
    })(ni);
  }
  setC.appendChild(sr);wrap.appendChild(setC);
  var repC=card();repC.appendChild(lbl("Rep Scheme"));
  var reps=[{id:"failure",name:"To Failure",note:"OG standard. Maximum reps each set."},{id:"rpe",name:"RPE 8-9 (RIR 1-2)",note:"Leave 1-2 reps in reserve. Best for high-frequency."},{id:"fixed",name:"Fixed Target",note:"Exact OG level target reps."}];
  for(var ri=0;ri<reps.length;ri++){
    (function(rs){var active=s.repScheme===rs.id;
      var row=dv({display:"flex",gap:"8px",alignItems:"flex-start",padding:"8px",marginBottom:"4px",background:active?"#e8e0d0":"transparent",border:"1px solid "+(active?Ci:Cl),borderRadius:"2px",cursor:"pointer"});
      row.appendChild(mk("div",{width:"12px",height:"12px",borderRadius:"50%",border:"2px solid "+(active?Ci:Cm),background:active?Ci:"transparent",marginTop:"2px",flexShrink:"0"}));
      var info=dv({});info.appendChild(mk("div",{fontFamily:FH,fontSize:"12px",color:active?Ci:Cm},rs.name));info.appendChild(tw(rs.note,{color:Cm,fontSize:"10px",fontStyle:"italic"}));row.appendChild(info);
      row.addEventListener("click",function(){D.settings.repScheme=rs.id;saveData(D);render();});repC.appendChild(row);
    })(reps[ri]);
  }
  wrap.appendChild(repC);
  var pc=card();pc.appendChild(lbl("Current Progressions"));pc.appendChild(mk("hr",{border:"none",borderTop:"1px solid "+Cm,margin:"6px 0"}));
  var ok=Object.keys(OG);
  for(var oi=0;oi<ok.length;oi++){
    (function(k){var c=OG[k];var curr=D.progressions[k];var ex=curr?findEx(k,curr):null;
      var row=dv({display:"flex",alignItems:"center",gap:"7px",padding:"4px 0",borderBottom:"1px dashed "+Cl});
      row.appendChild(mk("span",{color:c.color,fontSize:"11px",minWidth:"14px"},c.icon));
      row.appendChild(tw(c.label,{color:Cm,minWidth:"120px",fontSize:"10px"}));
      row.appendChild(mk("span",{flex:"1",fontFamily:FH,fontSize:"12px",color:ex?Ci:Cm,fontStyle:ex?"normal":"italic"},ex?ex.name:"not set"));
      if(ex)row.appendChild(stamp("L"+ex.level,Cm));pc.appendChild(row);
    })(ok[oi]);
  }
  wrap.appendChild(pc);return wrap;
}

render();
</script>
